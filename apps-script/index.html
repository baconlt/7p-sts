<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7 Presidents STS</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0d2137; --ocean:#1a4a6e; --wave:#2176ae; --sky:#57a0d3;
  --foam:#e8f4f8; --sun:#f7b731; --coral:#e8563a; --green:#27ae60;
  --text:#1a2d3d; --muted:#6b8a9a; --border:#d0e4ef; --light:#f8fafc;
  --sidebar:230px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Barlow',sans-serif;background:var(--foam);color:var(--text);min-height:100vh;}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
.splash-title{font-family:'Barlow Condensed',sans-serif;font-size:2.8rem;font-weight:800;color:#fff;letter-spacing:2px;text-align:center;width:100%;}
.splash-sub{color:var(--sky);font-size:.85rem;letter-spacing:3px;text-transform:uppercase;margin:6px 0 36px;}
.splash-bar{width:200px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.splash-fill{height:100%;background:linear-gradient(90deg,var(--wave),var(--sun));animation:fill 1.4s ease forwards;}
@keyframes fill{from{width:0}to{width:100%}}

/* ── LOGIN ── */
#login{display:none;position:fixed;inset:0;background:linear-gradient(150deg,var(--navy),var(--ocean) 60%,var(--wave));align-items:center;justify-content:center;}
.login-box{background:#fff;border-radius:16px;padding:44px 38px;width:350px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:su .35s ease;}
@keyframes su{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .icon{font-size:2.8rem;}
.login-logo h1{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:800;color:var(--navy);margin-top:6px;}
.login-logo p{color:var(--muted);font-size:.82rem;margin-top:3px;}
.tab-row{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:24px;}
.tab{flex:1;padding:9px;text-align:center;font-size:.83rem;font-weight:600;cursor:pointer;background:var(--foam);color:var(--muted);transition:all .2s;}
.tab.on{background:var(--navy);color:#fff;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.fg input,.fg select{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:'Barlow',sans-serif;font-size:.93rem;outline:none;transition:border .2s;background:#fff;}
.fg input:focus,.fg select:focus{border-color:var(--wave);}
.btn-full{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:700;letter-spacing:1px;cursor:pointer;}
.btn-full:hover{background:var(--ocean);}
.btn-google{width:100%;padding:11px;background:#fff;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:10px;font-family:'Barlow',sans-serif;}
.btn-google:hover{background:var(--foam);}
.login-err{color:var(--coral);font-size:.82rem;margin-top:8px;text-align:center;display:none;}

/* ── SHELL ── */
#app{display:none;min-height:100vh;}
.sidebar{width:var(--sidebar);background:var(--navy);color:#fff;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:transform .3s;}
.sb-head{padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;letter-spacing:1px;}
.sb-logo span{color:var(--sun);}
.sb-user{margin-top:9px;padding:8px 10px;background:rgba(255,255,255,.07);border-radius:8px;}
.sb-name{font-size:.87rem;font-weight:600;}
.sb-rank{font-size:.71rem;color:var(--sky);margin-top:3px;display:flex;align-items:center;gap:5px;}
.rank-dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.nav-label{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.3);padding:10px 8px 4px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:.87rem;font-weight:500;color:rgba(255,255,255,.75);transition:all .15s;margin-bottom:2px;}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-item.on{background:var(--wave);color:#fff;font-weight:600;}
.nav-badge{margin-left:auto;background:var(--coral);color:#fff;font-size:.67rem;font-weight:700;padding:2px 6px;border-radius:10px;display:none;}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08);}
.btn-logout{width:100%;padding:8px;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.55);border-radius:7px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:.82rem;}
.btn-logout:hover{background:rgba(255,255,255,.15);color:#fff;}
.guard-toggle{margin:5px 8px 2px;background:rgba(255,255,255,.07);border-radius:8px;padding:8px 11px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.gt-label{font-size:.77rem;font-weight:600;color:rgba(255,255,255,.5);transition:color .2s;}
.gt-label.on{color:var(--sun);}
.gt-track{width:28px;height:15px;border-radius:8px;background:rgba(255,255,255,.2);position:relative;transition:background .2s;flex-shrink:0;}
.gt-track.on{background:var(--sun);}
.gt-thumb{position:absolute;top:2.5px;left:2.5px;width:10px;height:10px;border-radius:50%;background:#fff;transition:left .2s;}
.gt-thumb.on{left:15.5px;}

/* ── MAIN ── */
.main{margin-left:var(--sidebar);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:#fff;border-bottom:1px solid var(--border);height:54px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:700;color:var(--navy);}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.content{padding:20px;flex:1;}

/* ── CARDS ── */
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid var(--border);margin-bottom:16px;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;color:var(--navy);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px;}
.stat{background:#fff;border-radius:10px;padding:14px;border:1px solid var(--border);text-align:center;}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:800;color:var(--navy);}
.stat-val.blue{color:var(--wave);} .stat-val.amber{color:var(--sun);} .stat-val.red{color:var(--coral);}
.stat-lbl{font-size:.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* ── BUTTONS ── */
.btn{padding:7px 14px;border-radius:8px;font-family:'Barlow',sans-serif;font-size:.84rem;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
.btn-sm{padding:4px 10px;font-size:.77rem;}
.btn-xs{padding:3px 8px;font-size:.72rem;}
.btn-navy{background:var(--navy);color:#fff;} .btn-navy:hover{background:var(--ocean);}
.btn-wave{background:var(--wave);color:#fff;} .btn-wave:hover{background:#1860a0;}
.btn-green{background:var(--green);color:#fff;} .btn-green:hover{background:#219150;}
.btn-coral{background:var(--coral);color:#fff;} .btn-coral:hover{background:#c94428;}
.btn-sun{background:var(--sun);color:var(--navy);} .btn-sun:hover{background:#c49010;}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--text);} .btn-outline:hover{border-color:var(--wave);color:var(--wave);}
.btn-ghost{background:transparent;border:none;color:var(--muted);padding:3px 6px;} .btn-ghost:hover{color:var(--coral);}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:.85rem;}
.tbl th{text-align:left;padding:8px 12px;font-size:.71rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border);}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--foam);}

/* ── BADGES ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.71rem;font-weight:700;text-transform:uppercase;}
.b-approved,.b-filled,.b-active{background:#d1fae5;color:#065f46;}
.b-denied,.b-cancelled,.b-inactive{background:#fee2e2;color:#991b1b;}
.b-pending{background:#fef3c7;color:#92400e;}
.b-open{background:#dbeafe;color:#1e40af;}
.b-floating{background:#fef9c3;color:#713f12;}
.rank-badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.69rem;font-weight:700;letter-spacing:.3px;}

/* ── HOURS ── */
.hrs{display:inline-block;padding:2px 7px;border-radius:9px;font-size:.71rem;font-weight:700;}
.hrs-ok{background:#d1fae5;color:#065f46;} .hrs-warn{background:#fef3c7;color:#92400e;} .hrs-ot{background:#fee2e2;color:#991b1b;}

/* ── SHIFT CHIPS ── */
.chip{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.72rem;font-weight:700;}
.chip-8HR{background:#dbeafe;color:#1e40af;} .chip-LS8{background:#ede9fe;color:#5b21b6;}
.chip-LSO{background:#fce7f3;color:#9d174d;} .chip-LS10{background:#d1fae5;color:#065f46;}
.chip-SPEC{background:#fef3c7;color:#92400e;} .chip-MISC{background:#f3f4f6;color:#374151;}

/* ══════════════════════════════════════════════════
   COMBINED SCHEDULE+AVAILABILITY GRID — CALENDAR MODE
══════════════════════════════════════════════════ */
.sched-container{
  display:flex;
  flex-direction:column;
  height:calc(100vh - 160px); /* full viewport minus topbar + controls */
  min-height:500px;
  border:1px solid var(--border);
  border-radius:10px;
  overflow:visible; /* must not be hidden — would clip fixed popovers */
  background:#fff;
  position:relative;
}
.sg-wrap{
  flex:1;
  overflow:auto; /* both axes */
  position:relative;
  border-radius:10px; /* radius on the scrollable child instead */
  will-change:unset; /* prevents new stacking context that would trap fixed children */
}
.sg{border-collapse:collapse;font-size:.79rem;}
/* Sticky column headers */
.sg thead th{
  background:var(--navy);color:#fff;
  padding:7px 4px;
  font-family:'Barlow Condensed',sans-serif;font-size:.82rem;font-weight:700;
  text-align:center;white-space:nowrap;
  position:sticky;top:0;z-index:20;
}
.sg th.name-col{
  text-align:left;padding-left:10px;
  min-width:140px;width:140px;
  position:sticky;left:0;top:0;z-index:30; /* frozen top-left corner */
}
/* Frozen left column — guard names */
.sg td.name-cell{
  position:sticky;left:0;z-index:10;
  padding:5px 10px;
  background:var(--foam);
  font-weight:600;
  border:1px solid var(--border);
  vertical-align:middle;
  min-width:140px;width:140px;
}
.sg td{
  border:1px solid var(--border);
  padding:2px;vertical-align:top;
  width:90px;min-width:82px;height:72px;
  position:relative;
}
.sg.condensed td{height:44px;}
.sg.condensed .cell-click{min-height:38px;}
.sg.condensed .cell-noshift{min-height:38px;}
/* Week separator — thick left border on Saturday columns */
.col-week-start{border-left:3px solid var(--ocean) !important;}
/* Date column header states */
.th-normal{background:var(--navy);}
.th-weekend{background:#1e3a5f;}
.th-holiday{background:#7c2d12;}
.th-today{background:#0369a1;}
/* Cell availability tints — shown when no shift assigned */
.av-tint-S_8HR    {background:#eff6ff;}
.av-tint-S_LS8    {background:#f5f3ff;}
.av-tint-S_LSO    {background:#ecfeff;}
.av-tint-S_8HR_LSO{background:#e0f2fe;}
.av-tint-S_SPEC   {background:#fff7ed;}
.av-tint-FLEX_OFF {background:#fefce8;}
.av-tint-FIXED_OFF{background:#fff1f2;}
.av-tint-S_8HR_OT {background:#f0fdf4;}
.av-tint-none     {background:#ffffff;}
/* Weekend/holiday tint override */
.col-weekend{background:#f1f5f9 !important;}
.col-holiday{background:#fffbeb !important;}
.col-today  {background:#f0f9ff !important;}
/* Cell with shift assigned */
.cell-assigned{background:#fff !important;}

/* The mini availability indicator dot in corner */
.av-dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;opacity:.8;}
/* Shift block inside cell */
.cell-shift{display:flex;flex-direction:column;align-items:flex-start;gap:1px;padding:3px 4px;border-radius:5px;cursor:pointer;font-size:.72rem;font-weight:700;margin:2px;line-height:1.2;}
.cell-shift:hover{opacity:.85;}
/* Empty clickable cell */
.cell-click{width:100%;height:100%;min-height:66px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;transition:all .15s;}
.cell-click:hover{background:rgba(33,118,174,.08);color:var(--wave);font-size:1.1rem;}
.cell-noshift{width:100%;height:100%;min-height:66px;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--border);}

/* ── MOBILE SCHEDULE — vertical day cards ── */
.mob-sched{display:none;flex-direction:column;gap:10px;}
.mob-day{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.mob-day-header{padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:10px;background:var(--foam);}
.mob-day-date{font-size:1.1rem;color:var(--navy);}
.mob-day-header.weekend{background:#eef2f7;}
.mob-day-header.holiday{background:#fef3c7;}
.mob-day-header.today{background:#e0f2fe;}
.mob-guard-row{display:flex;align-items:center;gap:10px;padding:7px 14px;border-top:1px solid var(--border);cursor:pointer;}
.mob-guard-row:hover{background:var(--foam);}
.mob-av-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mob-guard-name{flex:1;font-size:.85rem;font-weight:600;}
.mob-shift-chip{font-size:.76rem;}

@media(max-width:768px){
  .sched-container{display:none !important;}
  .mob-sched{display:flex !important;}
  .sched-container{height:auto;}
}
/* Hours column */
.hrs-col{text-align:center;width:46px;min-width:46px;background:var(--foam) !important;}

/* Legend bar */
.avail-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;font-size:.72rem;}
.avail-legend-item{display:flex;align-items:center;gap:4px;}
.avail-legend-dot{width:9px;height:9px;border-radius:50%;}

/* ── GUARD AVAILABILITY PAGE ── */
.avail-grid{display:flex;flex-direction:column;gap:1px;}
.avail-row{display:grid;grid-template-columns:120px 1fr 1fr;gap:0;border-bottom:1px solid var(--border);}
.avail-row:last-child{border-bottom:none;}
.avail-date-cell{padding:8px 10px;font-size:.83rem;font-weight:600;display:flex;flex-direction:column;justify-content:center;}
.avail-date-day{font-size:.68rem;color:var(--muted);text-transform:uppercase;}
.avail-status-cell{padding:6px 8px;display:flex;align-items:center;}
.avail-detail-cell{padding:6px 8px;font-size:.8rem;color:var(--muted);}
.avail-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;user-select:none;}
.avail-chip:hover{opacity:.85;transform:scale(1.03);}
.av-S_8HR    {background:#dbeafe;color:#1e40af;}
.av-S_LS8    {background:#ede9fe;color:#5b21b6;}
.av-S_LSO    {background:#cffafe;color:#155e75;}
.av-S_8HR_LSO{background:#bae6fd;color:#0c4a6e;}
.av-S_SPEC   {background:#ffedd5;color:#9a3412;}
.av-FLEX_OFF {background:#fef9c3;color:#713f12;}
.av-FIXED_OFF{background:#fee2e2;color:#991b1b;}
.av-S_8HR_OT {background:#d1fae5;color:#065f46;}
.av-none     {background:#f3f4f6;color:#9ca3af;border:1px dashed var(--border);}

/* shift-slot indicator on guard avail page */
.avail-shifts-col{display:flex;flex-wrap:wrap;gap:3px;padding:4px 8px;align-items:center;}

/* ── POPOVER ── */
.pop-wrap{position:relative;}
.pop{position:absolute;background:#fff;border:1.5px solid var(--border);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,.25);z-index:9999;min-width:180px;padding:5px 0;animation:su .15s ease;}
.pop.right{left:100%;top:0;margin-left:4px;}
.pop.below{top:100%;left:0;margin-top:4px;}
.pop.center{left:50%;transform:translateX(-50%);top:100%;margin-top:4px;}
.pop-item{padding:8px 13px;font-size:.83rem;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;transition:background .1s;}
.pop-item:hover{background:var(--foam);}
.pop-item.selected{font-weight:700;}
.pop-item.danger{color:var(--coral);}
.pop-divider{height:1px;background:var(--border);margin:4px 0;}
.pop-header{padding:6px 13px;font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.pop-swatch{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* assign form inside popover */
.pop-assign{padding:10px 12px;min-width:200px;}
.pop-assign label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;}
.pop-assign select{width:100%;padding:6px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:.82rem;margin-bottom:8px;font-family:'Barlow',sans-serif;outline:none;background:#fff;}
.pop-assign select:focus{border-color:var(--wave);}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:#fff;border-radius:14px;padding:24px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:su .2s ease;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;color:var(--navy);margin-bottom:16px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sel{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:'Barlow',sans-serif;font-size:.87rem;outline:none;background:#fff;}
.sel:focus{border-color:var(--wave);}
.inp{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:'Barlow',sans-serif;font-size:.87rem;outline:none;}
.inp:focus{border-color:var(--wave);}

/* pay reveal */
.pay-hidden{cursor:pointer;background:var(--border);border-radius:5px;padding:1px 9px;font-size:.79rem;color:var(--muted);user-select:none;letter-spacing:2px;}
.pay-hidden:hover{background:#c8d9e8;}

.splash-sub-wrap{text-align:center;margin-bottom:36px;}
.splash-sts{font-family:'Barlow Condensed',sans-serif;font-size:3.2rem;font-weight:800;color:var(--sun);letter-spacing:6px;line-height:1;}
.splash-tag{color:var(--sky);font-size:.78rem;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
/* ── SPINNER ── */
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px;}
@keyframes spin{to{transform:rotate(360deg)}}
.toasts{position:fixed;top:16px;right:16px;z-index:9000;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{background:#fff;border-radius:10px;padding:11px 15px;box-shadow:0 4px 16px rgba(0,0,0,.14);border-left:4px solid var(--wave);max-width:270px;font-size:.84rem;animation:sr .3s ease;}
.toast.ok{border-color:var(--green);} .toast.err{border-color:var(--coral);} .toast.warn{border-color:var(--sun);}
@keyframes sr{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}

/* ── MISC ── */
.empty{text-align:center;padding:36px 20px;color:var(--muted);}
.empty .ei{font-size:2.2rem;margin-bottom:8px;}
.flex{display:flex;} .gap2{gap:8px;} .gap3{gap:12px;} .wrap{flex-wrap:wrap;}

<script>
'use strict';

// ══════════════════════════════════════════
// RANK COLOR SYSTEM
// ══════════════════════════════════════════
const RANK_DEFAULTS = {
  'Lifeguard Supervisor':'#d4a017','Crew Captain':'#d4a017',
  'Captain':'#ef4444','Beach Captain':'#ef4444',
  'Lieutenant':'#f97316','Vet':'#3b82f6',
  'Guard':'#a78bfa','Rookie':'#a78bfa',
  'Replacement':'#94a3b8','Volunteer':'#94a3b8'
};
let RC = {...RANK_DEFAULTS};

function applyRC(cfgs) {
  (cfgs||[]).forEach(c => {
    if (!c.key.startsWith('rank_color_')) return;
    const k = c.key.slice(11).replace(/_/g,' ');
    const m = Object.keys(RC).find(r=>r.toLowerCase()===k.toLowerCase());
    if (m&&c.value) RC[m]=c.value;
  });
  if (S) setSidebarUser();
}
function rs(rank) {
  const hex=RC[rank]||'#94a3b8';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `background:${hex};color:${(0.299*r+0.587*g+0.114*b)/255>0.55?'#1a2d3d':'#fff'};`;
}


// Post color helper
function postColor(postId){
  const p=D.posts.find(x=>x.id===postId);
  return p&&p.color?p.color:'#2176ae';
}
function postTextColor(hex){
  if(!hex||hex.length<7)return'#fff';
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)/255>0.55?'#1a2d3d':'#fff';
}
// Availability color map
// Availability statuses — shift-type based
const AV_COLORS = {
  S_8HR:        '#2176ae',   // regular only
  S_LS8:        '#7c3aed',   // late shift LS8
  S_LSO:        '#0891b2',   // late shift only (LSO)
  S_8HR_LSO:    '#0e7490',   // regular + late shift only (saves two rows)
  S_SPEC:       '#ea580c',   // special/custom
  FLEX_OFF:     '#ca8a04',   // preferred off, flexible
  FIXED_OFF:    '#dc2626',   // hard day off
  S_8HR_OT:     '#16a34a',   // regular + OT willing
};
const AV_LABELS = {
  S_8HR:        '8HR',
  S_LS8:        'LS8',
  S_LSO:        'LSO',
  S_8HR_LSO:    '8HR + LSO',
  S_SPEC:       'Special',
  FLEX_OFF:     'Flex Day Off',
  FIXED_OFF:    'Day Off',
  S_8HR_OT:     'OT Day',
};
const AV_SHORT = {
  S_8HR:        '8HR',
  S_LS8:        'LS8',
  S_LSO:        'LSO',
  S_8HR_LSO:    '8HR+LSO',
  S_SPEC:       'Special',
  FLEX_OFF:     'Flex',
  FIXED_OFF:    'Off',
  S_8HR_OT:     'OT',
};
// Which statuses include late shift availability
const AV_LATE = new Set(['S_LS8','S_LSO','S_8HR_LSO']);
// Which statuses mean guard is available at all
const AV_AVAIL = new Set(['S_8HR','S_LS8','S_LSO','S_8HR_LSO','S_SPEC','S_8HR_OT']);
// Senior ranks required for late shifts
const LATE_SENIOR = ['Lifeguard Supervisor','Crew Captain','Captain','Beach Captain','Lieutenant'];

function fmtTime(val){
  if(!val) return '';
  const s=String(val).trim();
  if(!s||s==='TBD'||s==='Custom'||s==='—') return s;
  // Already "8:45 AM" format
  if(/^\d{1,2}:\d{2}\s*(AM|PM)$/i.test(s)) return s;
  // With seconds "8:45:00 AM" -> strip seconds
  const secMatch=s.match(/^(\d{1,2}:\d{2}):\d{2}\s*(AM|PM)$/i);
  if(secMatch) return secMatch[1]+' '+secMatch[2].toUpperCase();
  // Google Apps Script Date serialized as "Date(year,month,day,hour,min,sec)"
  const gasDate=s.match(/Date\(\d+,\d+,\d+,(\d+),(\d+)/);
  if(gasDate){
    let h=parseInt(gasDate[1]),m=parseInt(gasDate[2]);
    if(h===0&&m===0) return '';
    const ap=h>=12?'PM':'AM'; h=h%12||12;
    return h+':'+(m<10?'0':'')+m+' '+ap;
  }
  // Numeric serial (Excel/Sheets time fraction: 0.375 = 9:00 AM)
  if(/^\d+\.?\d*$/.test(s)){
    const n=parseFloat(s);
    if(n>0&&n<1){
      const totalMins=Math.round(n*24*60);
      let h=Math.floor(totalMins/60), m=totalMins%60;
      const ap=h>=12?'PM':'AM'; h=h%12||12;
      return h+':'+(m<10?'0':'')+m+' '+ap;
    }
    return '';
  }
  // ISO / 1899 serial from Sheets
  if(s.includes('T')||s.includes('1899')){
    try{
      const d=new Date(s);
      if(!isNaN(d)){
        let h=d.getUTCHours(),m=d.getUTCMinutes();
        if(h===0&&m===0) return '';
        const ap=h>=12?'PM':'AM'; h=h%12||12;
        return h+':'+(m<10?'0':'')+m+' '+ap;
      }
    }catch(e){}
  }
  // Plain HH:MM or HH:MM:SS
  if(/^\d{1,2}:\d{2}/.test(s)){
    const parts=s.split(':');
    let h=parseInt(parts[0]),m=parseInt(parts[1]);
    if(h===0&&m===0) return '';
    const ap=h>=12?'PM':'AM'; h=h%12||12;
    return h+':'+(m<10?'0':'')+m+' '+ap;
  }
  // Unknown format — log it so we can fix it
  console.warn('STS fmtTime: unhandled format:', JSON.stringify(val));
  return s;
}


// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S=null, GV=false, PANEL='dashboard', IMPERSONATE=null; // IMPERSONATE = guard object when admin is impersonating
let mobAvailChanges={};
let CLOCK_STATUS={clocked_in:false,record:null};
let PENDING_STATS=[]; // time records needing stats forms
let SNOOZED_STATS={}; // {time_record_id: snooze_until_date} // current clock-in state
let IMPERSONATE_CLOCK_STATUS={clocked_in:false,record:null}; // impersonated guard's clock state
let D={guards:[],posts:[],templates:[],periods:[],activePeriod:null,
       shifts:[],avail:[],pendingReqs:[],pendingSwaps:[],weeklyHours:{},
       mySwaps:[],config:[]};

const isTrueAdmin=()=>S&&S.role==='admin';
const isAdmin=()=>!GV&&!IMPERSONATE&&isTrueAdmin();
const myId=()=>IMPERSONATE?IMPERSONATE.id:(S&&S.guard?S.guard.id:null);
const myGuard=()=>IMPERSONATE?IMPERSONATE:(S&&S.guard?S.guard:null);

// ══════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════
function tryResumeSession(token) {
  if (!token) { showLogin(); return; }
  google.script.run
    .withSuccessHandler(r => {
      if (r && r.authenticated) {
        AUTH_TOKEN = token;
        S = { authenticated: true, guard: r.guard, role: r.role, token };
        startApp();
      } else {
        // Expired — clear everywhere then show login
        try { localStorage.removeItem('sts_token'); } catch(e) {}
        window.parent.postMessage({ type: 'sts_clear_session' }, '*');
        showLogin();
      }
    })
    .withFailureHandler(() => showLogin()) // network error — show login
    .clientValidateToken(token);
}

window.onload = () => {
  // Splash stays visible while we decide: resume session or show login

  // 1. Try localStorage directly (works for direct desktop / Android access)
  let localToken = null;
  try { localToken = localStorage.getItem('sts_token'); } catch(e) {}
  if (localToken) { tryResumeSession(localToken); return; }

  // 2. Ask PWA wrapper (works when running inside the iframe on iOS)
  let resolved = false;
  const timeout = setTimeout(() => { resolved = true; showLogin(); }, 1500);

  window.addEventListener('message', function onSessionMsg(e) {
    if (e.data?.type !== 'sts_session_data') return;
    if (resolved) return;
    resolved = true;
    clearTimeout(timeout);
    window.removeEventListener('message', onSessionMsg);
    tryResumeSession(e.data.token);
  });

  window.parent.postMessage({ type: 'sts_get_session' }, '*');
};

function hideSplash() {
  const s = document.getElementById('splash');
  if (!s) return;
  s.style.opacity = '0';
  setTimeout(() => { s.style.display = 'none'; }, 400);
}

function showLogin() {
  hideSplash();
  showMainLogin();
  document.getElementById('login').style.display = 'flex';
}

function startApp() {
  hideSplash();
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('content').innerHTML =
    '<div style="display:flex;align-items:center;justify-content:center;height:40vh;flex-direction:column;gap:12px;color:var(--muted)">' +
    '<span class="spinner" style="width:22px;height:22px;border-width:3px"></span>' +
    '<span style="font-size:.9rem;font-weight:600">Loading Dashboard…</span></div>';
  setSidebarUser();
  loadCore(() => {
    loadPeriodData(() => {
      bgLoad();
      buildSidebar();
      go('dashboard');
    });
  });
}


// ══════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════
let AUTH_TOKEN = null; // session token from server

function showMainLogin(){
  document.getElementById('form-main').style.display='block';

function passwordLogin(){

  if(!email||!pass){loginErr('Enter your email and password.');return;}
  const btn=document.getElementById('login-btn');
  if(btn){btn.disabled=true;btn.textContent='Signing in…';}
  google.script.run
    .withSuccessHandler(r=>{
      if(btn){btn.disabled=false;btn.textContent='Sign In';}
      if(r&&r.success){
        AUTH_TOKEN=r.token;
        S={authenticated:true,guard:r.guard,role:r.role,token:r.token};
        try { localStorage.setItem('sts_token', r.token); } catch(e) {}
        window.parent.postMessage({type:'sts_save_session',token:r.token,guard:r.guard,role:r.role},'*');
        if(r.must_change_pw){
          showForcePasswordChange();
        } else {
          startApp();
        }
      } else {
        loginErr(r?.message||'Login failed. Check your email and password.');
      }
    })
    .withFailureHandler(()=>{
      if(btn){btn.disabled=false;btn.textContent='Sign In';}
      loginErr('Connection error. Please try again.');
    })
    .clientLoginWithPassword(email,pass);
}

function loadCore(cb) {
  let n = 0;
  const need = 4;
  let done = false;
  const finish = () => { if (!done && n >= need) { done = true; if (cb) cb(); } };
  const tick = (label) => { n++; console.log(`SHORE loadCore tick ${n}/${need}: ${label}`); finish(); };

  // Hard timeout — proceed even if some calls fail silently
  setTimeout(() => { if (!done) { console.warn('SHORE loadCore timeout, proceeding'); done = true; if (cb) cb(); } }, 10000);

  run('clientGetGuards',    r => { D.guards    = r||[]; tick('guards');    }, () => tick('guards-fail'));
  run('clientGetPosts',     r => { D.posts     = r||[]; tick('posts');     }, () => tick('posts-fail'));
  run('clientGetTemplates', r => { D.templates = r||[]; tick('templates'); }, () => tick('templates-fail'));
  run('clientGetPeriods',   r => {
    D.periods = r||[];
    const today = ymd(new Date());
    D.activePeriod = D.periods.find(p => ymd(p.start_date)<=today && ymd(p.schedule_thru)>=today)
      || (D.periods.length ? D.periods[D.periods.length-1] : null);
    tick('periods');
  }, () => tick('periods-fail'));
}

function loadPeriodData(cb) {
  if (!D.activePeriod) { console.log('SHORE: no active period, skipping'); if (cb) cb(); return; }
  const pid = D.activePeriod.id;
  let n = 0;
  const need = isTrueAdmin() ? 3 : 2;
  let done = false;
  const finish = () => { if (!done && n >= need) { done = true; if (cb) cb(); } };
  const tick = (label) => { n++; console.log(`SHORE loadPeriodData tick ${n}/${need}: ${label}`); finish(); };

  setTimeout(() => { if (!done) { console.warn('SHORE loadPeriodData timeout, proceeding'); done = true; if (cb) cb(); } }, 10000);

  run('clientGetShifts',       r => { D.shifts = r||[]; tick('shifts');       }, () => tick('shifts-fail'),       pid);
  run('clientGetAvailability', r => { D.avail  = r||[]; tick('avail');        }, () => tick('avail-fail'),        pid);
  if (isTrueAdmin()) {
    run('clientGetWeeklySummary', r => { D.weeklyHours = r||{}; tick('hours'); }, () => tick('hours-fail'), pid);
  }
}

function go(panel){

  if(PANEL==='my-avail' && (Object.keys(availChanges).length>0||Object.keys(mobAvailChanges||{}).length>0) && panel!=='my-avail'){

  document.getElementById('content').innerHTML='';

}

function holiday(ds){
  const d=new Date(ds+'T12:00:00'),y=d.getFullYear(),m=d.getMonth(),day=d.getDate(),dow=d.getDay();
  if(m===4&&dow===1){const nx=new Date(y,4,day+7);if(nx.getMonth()!==4)return 'Memorial Day';}
  if(m===6&&day===4)return 'Independence Day';
  if(m===8&&dow===1&&day<=7)return 'Labor Day';
  return null;
}
function isWE(ds){const d=new Date(ds+'T12:00:00');return d.getDay()===0||d.getDay()===6;}
function dateRange(s,e){
  const dates=[],sd=new Date(ymd(s)+'T12:00:00'),ed=new Date(ymd(e)+'T12:00:00');
  let c=new Date(sd);while(c<=ed){dates.push(new Date(c));c.setDate(c.getDate()+1);}return dates;
}

function renderGuardDash(el){

  // Load clock status only for the real logged-in guard (not when impersonating)
  if(!GV&&!IMPERSONATE) loadClockStatus(()=>{ const w=document.getElementById('clock-widget'); if(w) renderClockWidget(w); });
  const gid=String(myId()), today=ymd(new Date());
  const mine=D.shifts.filter(s=>String(s.assigned_guard_id)===gid&&s.status!=='cancelled');
  const todayShifts=mine.filter(s=>s.date===today);
  const upcoming=mine.filter(s=>s.date>=today).sort((a,b)=>a.date>b.date?1:-1);
  const tasks=[];
  if(D.activePeriod&&!D.avail.some(a=>String(a.guard_id)===gid))
    tasks.push({icon:'🗓',text:`Submit your availability for <strong>${fd(D.activePeriod.start_date)} – ${fd(D.activePeriod.schedule_thru)}</strong>`,btn:`<button class="btn btn-wave btn-sm" onclick="go('my-avail')">Submit</button>`});
  D.mySwaps.filter(sw=>sw.target_id===gid&&sw.status==='pending_target').forEach(sw=>{
    const from=D.guards.find(g=>g.id===sw.requestor_id), shift=D.shifts.find(s=>s.id===sw.shift_id);
    tasks.push({icon:'🔄',text:`Swap request from <strong>${from?from.name:'a guard'}</strong>${shift?' for '+fd(shift.date):''}`,btn:`<button class="btn btn-green btn-sm" onclick="go('my-avail')">View</button>`});
  });

  // Pay period card — compute deadline warning
  const today2=ymd(new Date());
  const dl=D.activePeriod?ymd(D.activePeriod.availability_deadline):'';
  const daysUntilDl=dl?Math.round((new Date(dl+'T12:00:00')-new Date(today2+'T12:00:00'))/(1000*60*60*24)):null;
  const dlColor=daysUntilDl===null?'var(--muted)':daysUntilDl<0?'var(--muted)':daysUntilDl<=3?'var(--coral)':'var(--text)';
  const dlNote=daysUntilDl===null?'Not set':daysUntilDl<0?fd(dl)+' (passed)':daysUntilDl===0?fd(dl)+' — Today!':daysUntilDl===1?fd(dl)+' — Tomorrow!':fd(dl)+` — ${daysUntilDl} days`;
  const ppCard=D.activePeriod?`<div class="card" style="margin-bottom:14px">

      <div><span class="muted">Availability Deadline</span><div style="font-weight:600;color:${dlColor}">${dlNote}</div></div>
      <div><span class="muted">Time Report Due</span><div style="font-weight:600">${fd(D.activePeriod.time_report_due)||'Not set'}</div></div>
    </div>
    ${daysUntilDl!==null&&daysUntilDl>=0&&!D.avail.some(a=>String(a.guard_id)===gid)?`<div style="margin-top:10px;background:#fef9c3;border-radius:8px;padding:8px 12px;font-size:.82rem;display:flex;align-items:center;justify-content:space-between">
      <span>⚠️ Availability not submitted yet!</span>
      <button class="btn btn-wave btn-sm" onclick="go('my-avail')">Submit Now</button>
    </div>`:``}
  </div>`:'';

  el.innerHTML=`
    ${(GV||IMPERSONATE)?`<div class="preview-bar">${IMPERSONATE?'🎭 Impersonating':'👷 Guard view:'} <strong>${(IMPERSONATE||S.guard).name}</strong>${IMPERSONATE?` <button class="btn btn-sm btn-coral" onclick="doImpersonate()" style="margin-left:8px">Stop</button>`:''}</div>`:''}
    ${!GV&&!IMPERSONATE?'<div id="clock-widget"></div>':''}
    ${!GV&&!IMPERSONATE&&PENDING_STATS.length?renderStatsAlerts():''}
    ${ppCard}
    ${todayShifts.length?`<div class="card"><div class="card-title">📍 Today</div>${shiftCards(todayShifts,true)}</div>`:''}
    ${tasks.length?`<div class="card"><div class="card-title">⚡ Action Needed</div>${tasks.map(t=>`<div class="task-row"><div style="font-size:1.1rem">${t.icon}</div><div style="flex:1;font-size:.87rem">${t.text}</div>${t.btn}</div>`).join('')}</div>`:''}
    <div class="card"><div class="card-title">📅 My Shifts (${upcoming.length})</div>${upcoming.length?shiftCards(upcoming,true):`<div class="empty"><div class="ei">🏖️</div><p>Nothing scheduled yet.</p></div>`}</div>`;
}

        <div class="avail-legend-item"><div class="avail-legend-dot" style="background:#fff;border:1.5px solid var(--border)"></div><span class="muted">No response</span></div>

// Schedule view modes: 'full' | 'condensed' | 'assigned'
let SCHED_VIEW='full';
const SCHED_VIEW_CONFIG={
  full:      {label:'📊 Full',       next:'condensed', title:'Switch to condensed'},
  condensed: {label:'📋 Condensed',  next:'assigned',  title:'Show assigned only'},
  assigned:  {label:'✅ Assigned',   next:'full',      title:'Show full view'},
};
function cycleSchedView(){
  SCHED_VIEW=SCHED_VIEW_CONFIG[SCHED_VIEW].next;
  const btn=document.getElementById('view-toggle-btn');
  if(btn){btn.textContent=SCHED_VIEW_CONFIG[SCHED_VIEW].label;btn.title=SCHED_VIEW_CONFIG[SCHED_VIEW].title;}
  // Show/hide legend bar in condensed/assigned
  const legend=document.getElementById('avail-legend-bar');
  if(legend) legend.style.display=SCHED_VIEW==='full'?'flex':'none';

function renderSchedGrid(){
  const el=document.getElementById('sched-view');if(!el)return;
  if(!D.activePeriod){el.innerHTML='<p class="muted" style="padding:20px">No pay period.</p>';return;}
  const dates=dateRange(D.activePeriod.start_date,D.activePeriod.schedule_thru);
  const today=ymd(new Date());

  // Helper: get Saturday that starts the work week for a given date string
  function getWeekKey(ds){
    const d=new Date(ds+'T12:00:00'),dow=d.getDay(),diff=dow===6?0:-(dow+1);
    const sat=new Date(d);sat.setDate(d.getDate()+diff);return ymd(sat);
  }

  // Header row 1: date columns + weekly-total col after each Friday
  let th=`<tr><th class="name-col" rowspan="2">Guard</th>`;
  dates.forEach(d=>{
    const ds=ymd(d),hol=holiday(ds),we=isWE(ds),isT=ds===today,isSat=d.getDay()===6,isFri=d.getDay()===5;
    const cls=isT?'th-today':hol?'th-holiday':we?'th-weekend':'th-normal';
    const satStyle=isSat?'border-left:3px solid #57a0d3;':'';
    th+=`<th class="${cls}" style="min-width:86px;${satStyle}">${DAYS[d.getDay()]}<br>${d.getDate()}${hol?`<div style="font-size:.56rem;opacity:.85">${hol.split(' ')[0]}</div>`:''}</th>`;
    if(isFri) th+=`<th style="background:#1e3a5f;min-width:60px;font-size:.71rem;white-space:normal;line-height:1.2;padding:4px 3px" rowspan="2">Wk<br>Hrs/OT</th>`;
  });
  th+=`</tr>`;

  // Header row 2: shift slot counts per template type
  th+=`<tr>`;
  dates.forEach(d=>{
    const ds=ymd(d),isFri=d.getDay()===5,isSat=d.getDay()===6;
    const satStyle=isSat?'border-left:3px solid #57a0d3;':'';
    // Group by template code
    const dayShifts=D.shifts.filter(s=>s.date===ds&&s.status!=='cancelled');
    const tmplCodes=[...new Set(dayShifts.map(s=>s.template_code))].filter(Boolean);
    const lateShifts=dayShifts.filter(s=>['LS8','LSO','LS10'].includes(s.template_code));
    const lateAvailGuards=D.avail.filter(a=>a.date===ds&&AV_LATE.has(a.status));
    const seniorLateAvail=lateAvailGuards.some(a=>{const g=D.guards.find(x=>String(x.id)===String(a.guard_id));return g&&LATE_SENIOR.includes(g.rank);});
    const lateWarning=lateShifts.length>0&&lateAvailGuards.length>0&&!seniorLateAvail?'⚠️':'';
    const lateMoon=lateShifts.length>0?'🌙':'';

    if(!tmplCodes.length){
      th+=`<td style="background:#0d2137;border:1px solid #1e3a5f;padding:2px 1px;text-align:center;${satStyle}">
        <span style="font-size:.6rem;color:#4b5563">—</span>
      </td>`;
    } else {
      const lines=tmplCodes.map(code=>{
        const total=dayShifts.filter(s=>s.template_code===code).length;
        const filled=dayShifts.filter(s=>s.template_code===code&&s.status==='filled'&&s.assigned_guard_id).length;
        const color=filled>=total?'#86efac':filled>0?'#fde68a':'#94a3b8';
        return `<div style="font-size:.6rem;color:${color};font-weight:700;white-space:nowrap">${code} ${filled}/${total}</div>`;
      }).join('');
      th+=`<td style="background:#0d2137;border:1px solid #1e3a5f;padding:2px 3px;text-align:left;${satStyle}">
        ${lines}
        ${lateMoon?`<div style="font-size:.6rem;text-align:center">${lateMoon}${lateWarning}</div>`:''}
      </td>`;
    }
  });
  th+=`</tr>`;

  // Guard body rows — filter based on view mode
  const guardsToShow = SCHED_VIEW==='assigned'
    ? D.guards.filter(g=>D.shifts.some(s=>String(s.assigned_guard_id)===String(g.id)&&s.status!=='cancelled'))
    : D.guards;

  let tb=guardsToShow.map(g=>{
    const gid=String(g.id),rc=RC[g.rank]||'#94a3b8';
    let weekHours={};

    const cells=dates.map(d=>{
      const ds=ymd(d),hol=holiday(ds),we=isWE(ds),isT=ds===today,isSat=d.getDay()===6,isFri=d.getDay()===5;
      const satBorder=isSat?'border-left:3px solid var(--ocean) !important;':'';
      const avEntry=D.avail.find(a=>String(a.guard_id)===gid&&a.date===ds);
      const avStatus=avEntry?avEntry.status:null;
      const guardShifts=D.shifts.filter(s=>s.date===ds&&String(s.assigned_guard_id)===gid&&s.status!=='cancelled');
      const colCls=isT?'col-today':hol?'col-holiday':we?'col-weekend':'';

      if(guardShifts.length){
        // Accumulate hours for ALL shifts this day
        guardShifts.forEach(shift=>{
          const t=D.templates.find(x=>x.code===shift.template_code);
          const hrs=t?parseFloat(t.paid_hours)||0:0;
          const wk=getWeekKey(ds);weekHours[wk]=(weekHours[wk]||0)+hrs;
        });
        const avDot=avStatus?`<div class="av-dot" style="background:${AV_COLORS[avStatus]||'#ccc'}" title="${AV_LABELS[avStatus]||''}"></div>`:'';
        const chips=guardShifts.map(shift=>{
          const p=D.posts.find(x=>x.id===shift.post_id);
          const pc=postColor(shift.post_id);
          return`<div class="cell-shift" style="background:${pc}22;border-left:3px solid ${pc};border-radius:4px;padding:2px 4px;margin-bottom:1px;cursor:pointer" onclick="cellClick('${gid}','${ds}',event)">
            <span style="font-weight:700;color:${pc};font-size:.7rem">✓ ${shift.template_code}</span>
            <span style="font-size:.62rem;color:var(--text);opacity:.8"> ${p?p.name:''}</span>
          </div>`;
        }).join('');
        var cellHtml=`<td class="cell-assigned ${colCls}" style="${satBorder}padding:2px;vertical-align:top;position:relative">
          ${avDot}${chips}
          <div onclick="cellClick('${gid}','${ds}',event)" style="text-align:center;font-size:.75rem;color:#9ca3af;cursor:pointer;padding:1px 0;border-top:1px dashed #e5e7eb;margin-top:1px" title="Add another shift">+</div>
        </td>`;
      } else {
        const tintCls=avStatus&&AV_COLORS[avStatus]?`av-tint-${avStatus}`:'av-tint-none';
        const isUnavail=avStatus==='FIXED_OFF';

        // Get open slots for this date — group by post+template
        const openSlots=D.shifts.filter(s=>s.date===ds&&(s.status==='open'||s.status==='floating')&&!s.assigned_guard_id);
        // Deduplicate by post+template, count each
        const slotGroups=[];
        openSlots.forEach(s=>{
          const key=s.post_id+'|'+s.template_code;
          const existing=slotGroups.find(g=>g.key===key);
          if(existing) existing.count++;
          else slotGroups.push({key,post_id:s.post_id,template_code:s.template_code,shift_id:s.id,count:1});
        });

        const slotItems=slotGroups.map(sg=>{
          const p=D.posts.find(x=>x.id===sg.post_id);
          const pc=postColor(sg.post_id);
          const isLateSlot=['LS8','LSO','LS10'].includes(sg.template_code);
          return`<div onclick="cellClickWithSlot('${gid}','${ds}','${sg.post_id}','${sg.template_code}',event)"
            style="background:${pc}18;border-left:2px solid ${pc};border-radius:3px;padding:2px 4px;margin:1px;cursor:pointer;font-size:.65rem;font-weight:700;color:${pc};white-space:nowrap;overflow:hidden;text-overflow:ellipsis"
            title="${p?p.name:''} ${sg.template_code} (${sg.count} open)">
            ${isLateSlot?'🌙 ':''}${p?p.name.split(' ')[0]:''} ${sg.template_code}${sg.count>1?` ×${sg.count}`:''}
          </div>`;
        }).join('');

        var cellHtml=`<td class="${tintCls} ${colCls}" style="cursor:default;${satBorder}padding:2px;vertical-align:top;position:relative">
          <div style="display:flex;flex-direction:column;min-height:44px">
            ${slotItems}
            <div onclick="cellClick('${gid}','${ds}',event)"
              style="margin-top:auto;text-align:center;font-size:.7rem;color:#9ca3af;cursor:pointer;padding:1px 0;border-top:${slotItems?'1px dashed #e5e7eb':'none'}"
              title="Freeform assign">
              ${isUnavail?'<span style="color:#fca5a5;font-size:.65rem">Off</span> ':''}+
            </div>
          </div>
        </td>`;
      }

      // Weekly total column after Friday
      if(isFri){
        const wk=getWeekKey(ds),wkHrs=weekHours[wk]||0,otHrs=Math.max(0,wkHrs-40);
        const hcls=wkHrs>40?'ot':wkHrs>=36?'warn':'ok';
        cellHtml+=`<td style="text-align:center;background:var(--foam);border:1px solid var(--border);padding:3px 2px;vertical-align:middle;min-width:60px">
          <span class="hrs hrs-${hcls}" style="display:block;margin-bottom:2px">${wkHrs}h</span>
          ${otHrs>0?`<span class="hrs hrs-ot" style="font-size:.65rem">+${otHrs.toFixed(1)}h OT</span>`:''}
        </td>`;
      }
      return cellHtml;
    }).join('');

    // Build availability row — only in full mode
    const showAvRow = SCHED_VIEW==='full';
    const cellH = SCHED_VIEW==='full' ? '72px' : '44px';
    const avCells=showAvRow?dates.map(d=>{
      const ds=ymd(d),isSat=d.getDay()===6,isFri=d.getDay()===5;
      const satBorder=isSat?'border-left:3px solid var(--ocean) !important;':'';
      const avEntry=D.avail.find(a=>String(a.guard_id)===gid&&a.date===ds);
      // Also check for companion LSO entry (8HR+LSO combo)
      const avEntryLso=D.avail.find(a=>String(a.guard_id)===gid&&a.date===ds&&a.status==='S_LSO');
      const rawSt=avEntry?avEntry.status:null;
      const avStatus=(rawSt==='S_8HR'&&avEntryLso)?'S_8HR_LSO':rawSt;
      const isOff=avStatus==='FIXED_OFF'||avStatus==='FLEX_OFF';
      const bg=isOff?'#fef2f2':avStatus?AV_COLORS[avStatus]+'11':'#f9fafb';
      const textColor=isOff?'#dc2626':avStatus?AV_COLORS[avStatus]:'#d1d5db';
      const label=avStatus?AV_SHORT[avStatus]:'';
      const lateIcon=avStatus&&AV_LATE.has(avStatus)?'🌙':'';
      let cellHtml=`<td style="height:18px;padding:1px 2px;border:1px solid var(--border);background:${bg};${satBorder}text-align:center;vertical-align:middle">
        <span style="font-size:.62rem;font-weight:700;color:${textColor};white-space:nowrap">${lateIcon}${label}</span>
      </td>`;
      if(isFri) cellHtml+=`<td style="height:18px;background:var(--foam);border:1px solid var(--border)"></td>`;
      return cellHtml;
    }).join(''):[];

    return `${showAvRow?`<tr style="opacity:.9">
      <td class="name-cell" style="min-width:150px;height:18px;padding:2px 10px;background:#f1f5f9;border-bottom:none">
        <div style="font-size:.62rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px">Availability</div>
      </td>${avCells}
    </tr>`:''}
    <tr>
      <td class="name-cell" style="min-width:150px;height:${cellH}">
        <div class="flex items-c gap2">
          <div style="width:3px;height:${SCHED_VIEW==='full'?30:22}px;border-radius:2px;background:${rc};flex-shrink:0"></div>
          <div>${g.name}<div class="muted" style="font-size:.68rem">${g.rank}</div></div>
        </div>
      </td>${cells}
    </tr>`;
  }).join('');

  el.innerHTML=`<table class="sg${SCHED_VIEW!=='full'?' condensed':''}"><thead>${th}</thead><tbody>${tb}</tbody></table>`;
  renderMobSched(dates, today);
}

function renderMobSched(dates, today){
  const el=document.getElementById('mob-sched-view');if(!el)return;
  el.innerHTML=dates.map(d=>{
    const ds=ymd(d), hol=holiday(ds), we=isWE(ds), isT=ds===today, isSat=d.getDay()===6;
    const headerCls=isT?'today':hol?'holiday':we?'weekend':'';
    const borderStyle=isSat?'border-top:3px solid var(--ocean);':'';
    const guardRows=D.guards.map(g=>{
      const gid=String(g.id);
      const avEntry=D.avail.find(a=>String(a.guard_id)===gid&&a.date===ds);
      const avStatus=avEntry?avEntry.status:null;
      const shift=D.shifts.find(s=>s.date===ds&&String(s.assigned_guard_id)===gid&&s.status!=='cancelled');
      const t=shift?D.templates.find(x=>x.code===shift.template_code):null;
      const p=shift?D.posts.find(x=>x.id===shift.post_id):null;
      const avColor=avStatus?AV_COLORS[avStatus]:'#e5e7eb';
      return`<div class="mob-guard-row" onclick="cellClick('${gid}','${ds}',event)">
        <div class="mob-av-dot" style="background:${avColor}" title="${avStatus?AV_LABELS[avStatus]:'No availability'}"></div>
        <div style="width:3px;height:20px;border-radius:2px;background:${RC[g.rank]||'#94a3b8'};flex-shrink:0"></div>
        <div class="mob-guard-name">${g.name}</div>
        ${shift
          ?`<span class="chip chip-${shift.template_code||'MISC'} mob-shift-chip">✓ ${t?t.name:shift.template_code}${p?' · '+p.name:''}</span>`

            ?`<span style="font-size:.72rem;color:${AV_COLORS[avStatus]}">${AV_SHORT[avStatus]}</span>`

    }).join('');
    return`<div class="mob-day" style="${borderStyle}">

        ${isT?`<span style="font-size:.72rem;color:#0369a1;font-weight:600">Today</span>`:''}
      </div>${guardRows}
    </div>`;
  }).join('');
}

      }).join('');

      tb+=`<tr>

function guardHrs(gid){
  const key = Object.keys(D.weeklyHours).find(k=>String(k)===String(gid));
  if(!key) return 0;
  return Object.values(D.weeklyHours[key].weeks||{}).reduce((a,b)=>a+b,0);
}

function renderHours(){
  const el=document.getElementById('hours-view');if(!el)return;
  const wh=D.weeklyHours;
  if(!wh||!Object.keys(wh).length){el.innerHTML='<p class="muted">No hours data yet.</p>';return;}
  const weeks=[...new Set(Object.values(wh).flatMap(g=>Object.keys(g.weeks||{})))].sort();
  const th=`<tr><th>Guard</th>${weeks.map(w=>`<th>Wk ${fds(w)}</th>`).join('')}<th>Total</th></tr>`;
  const tb=D.guards.map(g=>{
    const gid=String(g.id);
    const key=Object.keys(wh).find(k=>String(k)===gid);
    const data=key?wh[key]:null; let tot=0;
    const cells=weeks.map(w=>{const h=data?.weeks?.[w]||0;tot+=h;return`<td style="text-align:center"><span class="hrs hrs-${h>40?'ot':h>=36?'warn':'ok'}">${h}h</span></td>`;}).join('');
    return`<tr><td><span class="rank-badge" style="${rs(g.rank)}">${g.name}</span></td>${cells}<td style="text-align:center"><span class="hrs hrs-${tot>80?'ot':'ok'}">${tot}h</span></td></tr>`;
  }).join('');
  el.innerHTML=`<div style="overflow-x:auto"><table class="tbl"><thead>${th}</thead><tbody>${tb}</tbody></table></div>`;
}

// ── Cell click handler ── opens assign/edit popover
let activePop=null;
function closeAllPops(){
  // Remove all pops from wherever they were appended (body or td)
  document.querySelectorAll('.pop').forEach(p=>p.remove());
  activePop=null;
}
document.addEventListener('click',e=>{
  if(activePop&&!activePop.contains(e.target))closeAllPops();
});

function spinAssign(btn,guardId,dateStr){
  if(btn){btn.disabled=true;btn.textContent='Assigning…';}
  doAssignShift(guardId,dateStr);
}

function doAssignShift(guardId,dateStr){
  const postId=document.getElementById('ap-post')?.value;
  const tmplCode=document.getElementById('ap-tmpl')?.value;
  if(!postId||!tmplCode){toast('Select post and template.','err');return;}
  const guard=D.guards.find(g=>String(g.id)===String(guardId));

  // Immediate button feedback
  const btn=document.querySelector('[onclick*="doAssignShift"]');
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Assigning…';}

  function onSuccess(shiftId){
    // Optimistic update — update local state immediately and re-render grid
    closeAllPops();
    const existing=D.shifts.find(s=>s.id===shiftId);
    if(existing){existing.assigned_guard_id=guardId;existing.status='filled';}
    else D.shifts.push({id:shiftId,date:dateStr,post_id:postId,template_code:tmplCode,
      assigned_guard_id:guardId,status:'filled',pay_period_id:D.activePeriod?.id});
    if(PANEL==='schedule') renderSchedGrid();
    toast('Shift assigned!','ok');
    // Sync with server in background
    reloadShifts();
  }

  arun('clientCheckOpenSlot',r=>{
    if(r&&r.hasOpen){
      arun('clientAssignShift',r2=>{
        if(r2&&r2.success) onSuccess(r2.id||r.openId);
        else { if(btn){btn.disabled=false;btn.innerHTML='✓ Assign Shift';} toast(r2?.message||'Failed.','err'); }
      },null,{pay_period_id:D.activePeriod.id,date:dateStr,post_id:postId,
        template_code:tmplCode,assigned_guard_id:guardId});
    } else {
      if(btn){btn.disabled=false;btn.innerHTML='✓ Assign Shift';}
      showModal(`<div class="modal-title">⚠️ No Open Slot</div>
        <p style="margin-bottom:16px">There is no open <strong>${tmplCode}</strong> slot at <strong>${D.posts.find(p=>p.id===postId)?.name||postId}</strong> on <strong>${fd(dateStr)}</strong>.</p>
        <p class="muted" style="margin-bottom:18px">Assigning <strong>${guard?guard.name:guardId}</strong> will create a new slot and may result in overstaffing.</p>
        <div class="modal-foot">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn btn-coral" onclick="doForceAssign('${guardId}','${dateStr}','${postId}','${tmplCode}')">Assign Anyway</button>
        </div>`);
    }
  },null,dateStr,postId,tmplCode);
}

function doForceAssign(guardId,dateStr,postId,tmplCode){
  closeModal();
  const tempId='TEMP-'+Date.now();
  // Optimistic update immediately
  D.shifts.push({id:tempId,date:dateStr,post_id:postId,template_code:tmplCode,
    assigned_guard_id:guardId,status:'filled',pay_period_id:D.activePeriod?.id});
  if(PANEL==='schedule') renderSchedGrid();
  arun('clientAssignShift',r=>{
    if(r&&r.success){
      // Replace temp with real ID
      const idx=D.shifts.findIndex(s=>s.id===tempId);
      if(idx>=0) D.shifts[idx].id=r.id;
      toast('Shift assigned (new slot created).','warn');
      reloadShifts();
    } else {
      // Rollback optimistic update
      D.shifts=D.shifts.filter(s=>s.id!==tempId);
      if(PANEL==='schedule') renderSchedGrid();
      toast(r?.message||'Failed.','err');
    }
  },null,{pay_period_id:D.activePeriod.id,date:dateStr,post_id:postId,
    template_code:tmplCode,assigned_guard_id:guardId});
}

function quickAssignLate(guardId,dateStr){
  closeAllPops();
  const postId=D.posts.length?D.posts[0].id:'';
  if(!postId||!D.activePeriod){toast('Set up posts first.','err');return;}
  arun('clientAssignShift',r=>{
    if(r&&r.success){toast('Late shift assigned!','ok');reloadShifts();}
    else toast(r?.message||'Failed.','err');
  },null,{pay_period_id:D.activePeriod.id,date:dateStr,post_id:postId,
    template_code:'LS8',assigned_guard_id:guardId});
}

function doUpdateCellShift(shiftId){
  const postId=document.getElementById('cp-post')?.value;
  const tmplCode=document.getElementById('cp-tmpl')?.value;
  const shift=D.shifts.find(s=>s.id===shiftId);
  if(shift&&shift.series_id){
    showSeriesPrompt('edit',shiftId,shift.series_id,shift.date,{post_id:postId,template_code:tmplCode});
  } else {
    // Optimistic update
    if(shift){shift.post_id=postId;shift.template_code=tmplCode;}
    closeAllPops();
    if(PANEL==='schedule') renderSchedGrid();
    arun('clientUpdateShift',r=>{
      if(r&&r.success){toast('Updated!','ok');reloadShifts();}
      else { toast('Failed.','err'); reloadShifts(); } // revert on fail
    },null,{id:shiftId,post_id:postId,template_code:tmplCode});
  }
}

function doRemoveCellShift(shiftId){
  const shift=D.shifts.find(s=>s.id===shiftId);
  if(shift&&shift.series_id){
    showSeriesPrompt('delete',shiftId,shift.series_id,shift.date,{});
  } else {
    if(!confirm('Remove this assignment?'))return;
    // Optimistic update
    if(shift){shift.assigned_guard_id='';shift.status='open';}
    closeAllPops();
    if(PANEL==='schedule') renderSchedGrid();
    toast('Removed.','warn');
    arun('clientCancelShift',()=>reloadShifts(),null,shiftId);
  }
}

function showSeriesPrompt(action, shiftId, seriesId, shiftDate, data){
  closeAllPops();
  const verb=action==='delete'?'Remove':'Edit';
  showModal(`<div class="modal-title">🔄 Repeating Shift</div>
    <p style="margin-bottom:18px">This shift is part of a repeating series. How would you like to ${verb.toLowerCase()} it?</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-outline" style="justify-content:flex-start;padding:12px 14px" onclick="doSeriesAction('${action}','instance','${shiftId}','${seriesId}','${shiftDate}',${JSON.stringify(data)})">
        <div><div style="font-weight:700">This instance only</div><div class="muted" style="font-size:.78rem">${fd(shiftDate)} only</div></div>
      </button>
      <button class="btn btn-outline" style="justify-content:flex-start;padding:12px 14px" onclick="doSeriesAction('${action}','future','${shiftId}','${seriesId}','${shiftDate}',${JSON.stringify(data)})">
        <div><div style="font-weight:700">This and all future shifts</div><div class="muted" style="font-size:.78rem">From ${fd(shiftDate)} onwards</div></div>
      </button>
      <button class="btn btn-outline" style="justify-content:flex-start;padding:12px 14px" onclick="doSeriesAction('${action}','all','${shiftId}','${seriesId}','${shiftDate}',${JSON.stringify(data)})">
        <div><div style="font-weight:700">All shifts in series</div><div class="muted" style="font-size:.78rem">Every instance</div></div>
      </button>
    </div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>`);
}

function doSeriesAction(action,scope,shiftId,seriesId,shiftDate,data){
  closeModal();
  if(scope==='instance'){
    if(action==='delete'){
      arun('clientCancelShift',()=>{toast('Removed.','warn');reloadShifts();},null,shiftId);
    } else {
      arun('clientUpdateShift',r=>{if(r&&r.success){toast('Updated!','ok');reloadShifts();}},null,{id:shiftId,...data});
    }
  } else {
    if(action==='delete'){
      arun('clientDeleteShiftSeries',r=>{
        if(r&&r.success)toast(`Removed ${r.count} shift${r.count!==1?'s':''}.`,'warn');
        reloadShifts();
      },null,seriesId,scope==='future'?shiftDate:'1900-01-01',scope);
    } else {
      // For edit future/all: update each matching shift
      const toUpdate=D.shifts.filter(s=>s.series_id===seriesId&&(scope==='all'||s.date>=shiftDate));
      let done=0;
      toUpdate.forEach(s=>arun('clientUpdateShift',()=>{if(++done===toUpdate.length){toast(`Updated ${done} shifts.`,'ok');reloadShifts();}},null,{id:s.id,...data}));
      if(!toUpdate.length){toast('No matching shifts.','warn');}
    }
  }
}



function switchPeriod(pid){
  D.activePeriod=D.periods.find(p=>p.id===pid);
  run('clientGetShifts',r=>{
    D.shifts=r||[];
    run('clientGetAvailability',a=>{
      D.avail=a||[];
      run('clientGetWeeklySummary',h=>{
        D.weeklyHours=h||{};
        renderSchedGrid();  // also calls renderMobSched internally
        renderHours();
      },null,pid);
    },null,pid);
  },null,pid);
}

  return`<table class="tbl"><thead><tr><th>Guard</th><th>Shift</th><th>Date</th><th>Post</th><th>Actions</th></tr></thead><tbody>${reqs.map(r=>{
    const g=D.guards.find(x=>x.id===r.guard_id),s=D.shifts.find(x=>x.id===r.shift_id);
    const p=s?D.posts.find(x=>x.id===s.post_id):null,t=s?D.templates.find(x=>x.code===s.template_code):null;
    return`<tr><td><strong>${g?g.name:r.guard_id}</strong><br><span class="rank-badge" style="${g?rs(g.rank):''};font-size:.66rem;padding:1px 7px">${g?g.rank:''}</span></td>
      <td>${t?`<span class="chip chip-${t.code}">${t.name}</span>`:r.shift_id}</td>
      <td>${s?fd(s.date):'—'}</td><td>${p?p.name:'—'}</td>
      <td class="flex gap2"><button class="btn btn-green btn-sm" onclick="doApproveReq('${r.id}')">✓</button><button class="btn btn-coral btn-sm" onclick="doDenyReq('${r.id}')">✗</button></td></tr>`;
  }).join('')}</tbody></table>`;
}

// Drag-and-drop reorder for posts
let dragSrcRow=null;
function postDragStart(e){dragSrcRow=e.currentTarget;e.dataTransfer.effectAllowed='move';}
function postDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';return false;}
function postDrop(e,targetRow){
  e.stopPropagation();e.preventDefault();
  if(dragSrcRow===targetRow)return;
  const tbody=document.getElementById('posts-tbody');
  const rows=[...tbody.querySelectorAll('tr')];
  const srcIdx=rows.indexOf(dragSrcRow),tgtIdx=rows.indexOf(targetRow);
  if(srcIdx<tgtIdx)targetRow.after(dragSrcRow);else targetRow.before(dragSrcRow);
  // Save new order
  const newOrder=[...tbody.querySelectorAll('tr')].map((r,i)=>({id:r.dataset.id,sort_order:i+1}));
  newOrder.forEach(o=>arun('clientUpdatePost',null,null,{id:o.id,sort_order:o.sort_order}));
  // Update local state
  newOrder.forEach(o=>{const p=D.posts.find(x=>x.id===o.id);if(p)p.sort_order=o.sort_order;});
  toast('Post order saved','ok');
}

      <div>

        <div class="muted" style="font-size:.78rem">${fd(D.activePeriod.start_date)} – ${fd(D.activePeriod.schedule_thru)} · ${D.activePeriod.availability_deadline?`Deadline: <strong>${fd(D.activePeriod.availability_deadline)}</strong>`:'No deadline set'}</div>
      </div>

        <button class="btn btn-navy btn-sm" onclick="saveMyAvail()"><span id="avail-save-icon">💾</span> Save</button>

      </div>
    </div>

    <div style="display:grid;grid-template-columns:90px 1fr 140px;background:var(--foam);border-bottom:2px solid var(--border)">
      <div style="padding:6px 8px;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase">Date</div>
      <div style="padding:6px 8px;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-left:1px solid var(--border)">Available Shifts</div>
      <div style="padding:6px 8px;font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-left:1px solid var(--border)">My Availability</div>
    </div>
    <div id="avail-grid" style="overflow:visible">${rows}</div>
    <div style="padding:12px 16px;border-top:1px solid var(--border)" class="flex gap2 items-c">
      <button class="btn btn-navy" onclick="saveMyAvail()"><span id="avail-save-icon2">💾</span> Save Availability</button>
      <span id="avail-save-status2" class="muted" style="font-size:.8rem"></span>
    </div>
  </div>`;

  document.addEventListener('click', closeAvPops, {capture:false});
};


let activeAvPop=null;
function closeAvPops(e){
  if(activeAvPop&&!activeAvPop.closest('.pop-wrap').contains(e.target)){
    document.querySelectorAll('[id^="avpop-"]').forEach(p=>p.style.display='none');
    activeAvPop=null;
  }
}

function openAvPop(ds,chipEl){
  event.stopPropagation();
  document.querySelectorAll('[id^="avpop-"]').forEach(p=>{
    p.style.display='none';
    p.style.position='';
    p.style.top='';
    p.style.left='';
    p.style.zIndex='';
  });
  const pop=document.getElementById(`avpop-${ds}`);
  if(!pop)return;

  // Use fixed positioning to escape any overflow:hidden ancestors
  pop.style.display='block';
  pop.style.position='fixed';
  pop.style.zIndex='9999';

  requestAnimationFrame(()=>{
    // Position relative to the chip element
    const chip=document.getElementById(`avchip-${ds}`);
    const anchor = chip || chipEl;
    if(!anchor){pop.style.display='none';return;}
    const rect=anchor.getBoundingClientRect();
    const pw=pop.offsetWidth||200;
    const ph=pop.offsetHeight||300;
    const vw=window.innerWidth;
    const vh=window.innerHeight;

    // Horizontal: align to chip left, flip left if overflows right
    let left=rect.left;
    if(left+pw>vw-8) left=Math.max(8,rect.right-pw);
    pop.style.left=left+'px';

    // Vertical: below chip by default, flip above if overflows bottom
    let top=rect.bottom+4;
    if(top+ph>vh-8){
      top=rect.top-ph-4;
    }
    if(top<8) top=8;
    pop.style.top=top+'px';
  });

  activeAvPop=pop;
}

// Track unsaved changes
let availChanges={};
function setMyAvail(ds,status){
  event.stopPropagation();
  document.querySelectorAll('[id^="avpop-"]').forEach(p=>p.style.display='none');
  activeAvPop=null;

  // Update chip UI immediately
  const chip=document.getElementById(`avchip-${ds}`);
  if(chip){
    chip.className=`avail-chip av-${status}`;
    chip.innerHTML=`● ${AV_LABELS[status]}`;
  }

  // Track change — S_8HR_LSO saves two rows
  const existing=D.avail.find(a=>String(a.guard_id)===String(myId())&&a.date===ds);
  if(status==='S_8HR_LSO'){
    availChanges[ds]={guard_id:myId(),date:ds,status:'S_8HR',custom_start:'',custom_end:'',ot_willing:false,notes:''};
    availChanges[ds+'_lso']={guard_id:myId(),date:ds,status:'S_LSO',custom_start:'',custom_end:'',ot_willing:false,notes:''};
  } else {
    // Remove any LSO companion row if switching away
    delete availChanges[ds+'_lso'];
    availChanges[ds]={guard_id:myId(),date:ds,status,
      custom_start:existing?.custom_start||'',custom_end:existing?.custom_end||'',
      ot_willing:status==='S_8HR_OT',notes:''};
  }

  // Show special detail if needed
  if(status==='SPECIAL') showSpecialDetail(ds);

  // Flash the row
  const row=document.getElementById(`avrow-${ds}`);
  if(row){row.style.outline='2px solid var(--wave)';setTimeout(()=>row.style.outline='',1000);}

  const n=Object.keys(availChanges).length;
  const msg=n>0?`${n} unsaved change${n!==1?'s':''}…`:'';
  ['avail-save-status','avail-save-status2'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.textContent=msg;
  });
}

function showSpecialDetail(ds){
  const row=document.getElementById(`avrow-${ds}`);if(!row)return;
  const statusCell=row.querySelector('.avail-status-cell');if(!statusCell)return;
  if(statusCell.querySelector('.special-detail'))return; // already shown
  const div=document.createElement('div');
  div.className='special-detail mt1';
  div.style.cssText='font-size:.78rem;display:flex;flex-wrap:wrap;gap:6px;align-items:center;';
  div.innerHTML=`<label class="flex items-c gap2"><input type="checkbox" id="sp-li-${ds}"> Late in @<input type="time" id="sp-in-${ds}" class="inp" style="width:100px;padding:3px 6px;font-size:.78rem"></label>
    <label class="flex items-c gap2"><input type="checkbox" id="sp-eo-${ds}"> Early out @<input type="time" id="sp-out-${ds}" class="inp" style="width:100px;padding:3px 6px;font-size:.78rem"></label>
    <input type="text" id="sp-note-${ds}" class="inp" placeholder="Note" style="width:120px;padding:3px 6px;font-size:.78rem">`;
  statusCell.appendChild(div);
  // Wire changes to availChanges
  ['sp-in-'+ds,'sp-out-'+ds,'sp-note-'+ds].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.addEventListener('input',()=>updateSpecial(ds));
  });
}

function updateSpecial(ds){
  if(!availChanges[ds])return;
  availChanges[ds].custom_start=document.getElementById(`sp-in-${ds}`)?.value||'';
  availChanges[ds].custom_end=document.getElementById(`sp-out-${ds}`)?.value||'';
  availChanges[ds].notes=document.getElementById(`sp-note-${ds}`)?.value||'';
}

function saveMyAvail(){
  const entries=Object.values(availChanges);
  if(!entries.length){toast('No changes to save.','warn');return;}

  // Immediately disable ALL save buttons and show spinner
  const allBtns=document.querySelectorAll('[onclick="saveMyAvail()"]');
  allBtns.forEach(b=>{b.disabled=true;b.innerHTML='<span class="spinner"></span> Saving…';});
  ['avail-save-status','avail-save-status2'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.innerHTML='';
  });

  runG('clientSubmitAvailability',r=>{
    // Re-enable all buttons
    allBtns.forEach(b=>{b.disabled=false;b.innerHTML='💾 Save Availability';});
    if(r&&r.success){
      toast(`Saved ${entries.length} day${entries.length!==1?'s':''}!`,'ok');
      entries.forEach(e=>{
        const idx=D.avail.findIndex(a=>String(a.guard_id)===String(e.guard_id)&&a.date===e.date);
        if(idx>=0)D.avail[idx]={...D.avail[idx],...e};
        else D.avail.push(e);
      });
      availChanges={};
      ['avail-save-status','avail-save-status2'].forEach(id=>{
        const el=document.getElementById(id);
        if(el){el.innerHTML='<span style="color:var(--green);font-weight:600">✓ Saved</span>';
          setTimeout(()=>{if(el)el.innerHTML='';},4000);}
      });
    } else {
      toast(r?.message||'Failed to save.','err');
      ['avail-save-status','avail-save-status2'].forEach(id=>{
        const el=document.getElementById(id);
        if(el)el.innerHTML='<span style="color:var(--coral)">Save failed — try again</span>';
      });
    }
  },null,entries);
}

R['my-schedule']=function(){

  const dates=dateRange(D.activePeriod.start_date,D.activePeriod.schedule_thru);

  // Two header rows: dates + availability row label

    const rawSt=avEntry?avEntry.status:null;

  th+=`</tr>`;

  // Shift row
  let cells=dates.map(d=>{

    const satBorder=isSat?'border-left:3px solid var(--ocean);':'';

        </div>

  el.innerHTML=`
    <div class="card" style="padding:8px;margin-bottom:14px">

      </div>
      ${mine.length ? `<div class="sched-container" style="height:auto;max-height:200px">
        <div class="sg-wrap">

            <thead>${th}</thead>
            <tbody><tr>
              <td class="name-cell" style="position:sticky;left:0;z-index:10;vertical-align:middle">
                <div class="flex items-c gap2">
                  <div style="width:3px;height:30px;border-radius:2px;background:${RC[g.rank]||'#94a3b8'}"></div>
                  <div>${g.name}<div class="muted" style="font-size:.68rem">${g.rank}</div></div>

              </td>${cells}
            </tr></tbody>
          </table>
        </div>

    <div class="card"><div class="card-title">My Shifts (${mine.length})</div>${mine.length?shiftCards(mine):'<div class="empty"><div class="ei">🏖️</div><p>Nothing scheduled yet.</p></div>'}</div>`;

// GUARD: FULL SCHEDULE — dates across top, guards by post, rank order

let fsView='post'; // 'post' or 'condensed'
let fsWeekOffset=0; // which week to show in condensed view

R['full-schedule']=function(){
  const el=document.getElementById('content');
  if(!D.activePeriod){el.innerHTML='<div class="card"><p class="muted">No active pay period.</p></div>';return;}

  el.innerHTML=`
    <div class="flex gap2 items-c wrap" style="margin-bottom:10px">
      <div style="display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden">
        <button class="btn btn-sm" id="fsv-post" onclick="setFsView('post')"
          style="border-radius:0;${fsView==='post'?'background:var(--navy);color:#fff':'background:#fff;color:var(--muted)'}">By Post</button>
        <button class="btn btn-sm" id="fsv-cond" onclick="setFsView('condensed')"
          style="border-radius:0;${fsView==='condensed'?'background:var(--navy);color:#fff':'background:#fff;color:var(--muted)'}">Condensed</button>

function setFsView(v){
  fsView=v; fsWeekOffset=0;
  document.getElementById('fsv-post').style.cssText='border-radius:0;'+(v==='post'?'background:var(--navy);color:#fff':'background:#fff;color:var(--muted)');
  document.getElementById('fsv-cond').style.cssText='border-radius:0;'+(v==='condensed'?'background:var(--navy);color:#fff':'background:#fff;color:var(--muted)');
  renderFsBody();
}

function renderFsBody(){
  const el=document.getElementById('fs-view-body'); if(!el)return;
  if(fsView==='condensed') renderFsCondensed(el);
  else renderFsPost(el);
}

function renderFsPost(el){
  if(!D.activePeriod){return;}
  const dates=dateRange(D.activePeriod.start_date,D.activePeriod.schedule_thru);
  const today=ymd(new Date());
  const assigned=D.shifts.filter(s=>s.status!=='cancelled'&&s.assigned_guard_id);
  if(!assigned.length){
    el.innerHTML='<div class="empty"><div class="ei">📭</div><p>No shifts published yet.</p></div>';
    return;
  }
  const RANK_ORDER=['Lifeguard Supervisor','Crew Captain','Captain','Beach Captain','Lieutenant','Vet','Guard','Rookie','Replacement','Volunteer'];
  const rankIdx=r=>RANK_ORDER.indexOf(r)<0?99:RANK_ORDER.indexOf(r);

  let th=`<tr><th style="background:var(--navy);color:#fff;padding:8px 10px;text-align:left;position:sticky;left:0;z-index:20;min-width:130px">Post / Guard</th>`;
  dates.forEach(d=>{
    const ds=ymd(d),hol=holiday(ds),we=isWE(ds),isT=ds===today,isSat=d.getDay()===6;
    const cls=isT?'th-today':hol?'th-holiday':we?'th-weekend':'th-normal';
    const satStyle=isSat?'border-left:3px solid #57a0d3;':'';
    th+=`<th class="${cls}" style="min-width:90px;${satStyle}">${DAYS[d.getDay()]}<br>${MONTHS[d.getMonth()]} ${d.getDate()}</th>`;
  });
  th+=`</tr>`;

  let tb='';
  D.posts.forEach(post=>{
    const postShifts=assigned.filter(s=>s.post_id===post.id);
    const guardIds=[...new Set(postShifts.map(s=>String(s.assigned_guard_id)))];
    if(!guardIds.length) return;
    const postGuards=guardIds.map(gid=>D.guards.find(g=>String(g.id)===gid)).filter(Boolean)
      .sort((a,b)=>rankIdx(a.rank)-rankIdx(b.rank));
    const pc=post.color||'#2176ae';
    const ptc=postTextColor(pc);
    tb+=`<tr><td colspan="${dates.length+1}" style="background:${pc};color:${ptc};padding:5px 12px;font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.5px;position:sticky;left:0">${post.name.toUpperCase()}</td></tr>`;
    postGuards.forEach(g=>{
      const gid=String(g.id),rc=RC[g.rank]||'#94a3b8';
      const cells=dates.map(d=>{
        const ds=ymd(d),hol=holiday(ds),we=isWE(ds),isT=ds===today,isSat=d.getDay()===6;
        const satBorder=isSat?'border-left:3px solid var(--ocean);':'';
        const colCls=isT?'col-today':hol?'col-holiday':we?'col-weekend':'';
        const dayGuardShifts=postShifts.filter(s=>s.date===ds&&String(s.assigned_guard_id)===gid);
        if(dayGuardShifts.length){
          const chips=dayGuardShifts.map(shift=>{
            const t=D.templates.find(x=>x.code===shift.template_code);
            return`<div style="background:${pc}22;border-left:3px solid ${pc};border-radius:4px;padding:2px 5px;font-size:.71rem;font-weight:700;margin-bottom:1px">
              <span style="color:${pc}">✓ ${shift.template_code}</span>
              <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${rc};margin-left:3px;vertical-align:middle"></span>
              <div style="font-size:.62rem;color:var(--muted)">${t&&t.start_time!=='Custom'&&t.start_time!=='TBD'?fmtTime(t.start_time)+'–'+fmtTime(t.end_time):''}</div>
            </div>`;
          }).join('');
          return`<td class="cell-assigned ${colCls}" style="${satBorder}padding:4px">${chips}</td>`;
        }
        return`<td class="${colCls}" style="${satBorder}"><div class="cell-noshift">—</div></td>`;
      }).join('');
      tb+=`<tr>
        <td class="name-cell" style="position:sticky;left:0;z-index:10;border-left:3px solid ${rc}">
          <div class="flex items-c gap2">
            <div style="width:3px;height:28px;border-radius:2px;background:${rc};flex-shrink:0"></div>
            <div>${g.name}<div class="muted" style="font-size:.67rem">${g.rank}</div></div>
