  el.innerHTML=`<div class="card" style="padding:8px">
    <div class="sched-container"><div class="sg-wrap">
      <table class="sg"><thead>${th}</thead><tbody>${tb}</tbody></table>
    </div></div>
  </div>`;
}

function renderFsCondensed(el){
  if(!D.activePeriod)return;
  const RANK_ORDER=['Lifeguard Supervisor','Crew Captain','Captain','Beach Captain','Lieutenant','Vet','Guard','Rookie','Replacement','Volunteer'];
  const rankIdx=r=>RANK_ORDER.indexOf(r)<0?99:RANK_ORDER.indexOf(r);
  const assigned=D.shifts.filter(s=>s.status!=='cancelled'&&s.assigned_guard_id);
  const today=ymd(new Date());

  // Get all Sat-Fri weeks in the period
  const allDates=dateRange(D.activePeriod.start_date,D.activePeriod.schedule_thru);
  // Find all Saturdays (week start) in range
  const weeks=[];
  allDates.forEach(d=>{
    if(d.getDay()===6){
      const sat=ymd(d);
      const fri=new Date(d); fri.setDate(d.getDate()+6);
      weeks.push({sat,fri:ymd(fri),label:`${MONTHS[d.getMonth()]} ${d.getDate()} – ${MONTHS[fri.getMonth()]} ${fri.getDate()}`});
    }
  });
  // If period doesn't start on Saturday, add a partial first week
  if(allDates.length && allDates[0].getDay()!==6){
    const firstSat=new Date(allDates[0]);
    while(firstSat.getDay()!==6) firstSat.setDate(firstSat.getDate()-1);
    if(!weeks.find(w=>w.sat===ymd(firstSat))){
      const fri=new Date(firstSat); fri.setDate(firstSat.getDate()+6);
      weeks.unshift({sat:ymd(firstSat),fri:ymd(fri),label:`${MONTHS[firstSat.getMonth()]} ${firstSat.getDate()} – ${MONTHS[fri.getMonth()]} ${fri.getDate()}`});
    }
  }
  if(!weeks.length){el.innerHTML='<div class="empty"><p class="muted">No weeks in period.</p></div>';return;}
  fsWeekOffset=Math.max(0,Math.min(fsWeekOffset,weeks.length-1));
  const week=weeks[fsWeekOffset];

  // 7 days Sat–Fri
  const weekDates=[];
  const sat=new Date(week.sat+'T12:00:00');
  for(let i=0;i<7;i++){const d=new Date(sat);d.setDate(sat.getDate()+i);weekDates.push(d);}

  // All guards who have at least one shift in this week, sorted by rank
  const weekShifts=assigned.filter(s=>s.date>=week.sat&&s.date<=week.fri);
  const guardIds=[...new Set(weekShifts.map(s=>String(s.assigned_guard_id)))];
  const guards=guardIds.map(gid=>D.guards.find(g=>String(g.id)===gid)).filter(Boolean)
    .sort((a,b)=>rankIdx(a.rank)-rankIdx(b.rank));

  // Header
  let th=`<tr>
    <th style="background:var(--navy);color:#fff;padding:8px 10px;text-align:left;position:sticky;left:0;z-index:20;min-width:150px;width:150px">Guard</th>`;
  weekDates.forEach(d=>{
    const ds=ymd(d),isT=ds===today,hol=holiday(ds),we=isWE(ds),isSat=d.getDay()===6;
    const cls=isT?'th-today':hol?'th-holiday':we?'th-weekend':'th-normal';
    const satStyle=isSat?'border-left:3px solid #57a0d3;':'';
    th+=`<th class="${cls}" style="min-width:88px;${satStyle}">${DAYS[d.getDay()]}<br><span style="font-size:.75rem">${MONTHS[d.getMonth()]} ${d.getDate()}</span></th>`;
  });
  th+=`<th style="background:var(--navy);color:#fff;min-width:56px;font-size:.75rem">Total</th></tr>`;

  // Guard rows
  let tb=guards.map(g=>{
    const gid=String(g.id),rc=RC[g.rank]||'#94a3b8';
    let weekHrs=0;
    const cells=weekDates.map(d=>{
      const ds=ymd(d),isT=ds===today,hol=holiday(ds),we=isWE(ds),isSat=d.getDay()===6;
      const colCls=isT?'col-today':hol?'col-holiday':we?'col-weekend':'';
      const satBorder=isSat?'border-left:3px solid var(--ocean);':'';
      const dayShifts=weekShifts.filter(s=>s.date===ds&&String(s.assigned_guard_id)===gid);
      if(!dayShifts.length) return`<td class="${colCls}" style="${satBorder}text-align:center;vertical-align:middle"><span style="color:var(--border);font-size:.75rem">—</span></td>`;
      const content=dayShifts.map(s=>{
        const t=D.templates.find(x=>x.code===s.template_code);
        const pc=postColor(s.post_id);
        const hrs=t?parseFloat(t.paid_hours)||0:0;
        weekHrs+=hrs;
        return`<div style="font-size:.72rem;font-weight:700;color:${pc};line-height:1.3">
          ${s.template_code}
          <div style="font-size:.66rem;color:var(--muted);font-weight:400">${t&&t.start_time!=='TBD'&&t.start_time!=='Custom'?fmtTime(t.start_time):''}${t&&t.end_time!=='TBD'&&t.end_time!=='Custom'?' – '+fmtTime(t.end_time):''}</div>
        </div>`;
      }).join('');
      return`<td class="cell-assigned ${colCls}" style="${satBorder}padding:4px;vertical-align:top">${content}</td>`;
    }).join('');
    const otHrs=Math.max(0,weekHrs-40);
    return`<tr>
      <td class="name-cell" style="position:sticky;left:0;z-index:10">
        <div class="flex items-c gap2">
          <div style="width:3px;height:28px;border-radius:2px;background:${rc};flex-shrink:0"></div>
          <div style="font-size:.83rem">${g.name}<div class="muted" style="font-size:.66rem">${g.rank}</div></div>
        </div>
      </td>${cells}
      <td style="text-align:center;background:var(--foam);border:1px solid var(--border);padding:4px 2px;vertical-align:middle">
        <span class="hrs hrs-${weekHrs>40?'ot':weekHrs>=36?'warn':'ok'}" style="display:block">${weekHrs}h</span>
        ${otHrs>0?`<span class="hrs hrs-ot" style="font-size:.64rem">+${otHrs.toFixed(1)}OT</span>`:''}
      </td>
    </tr>`;
  }).join('');

  if(!guards.length) tb=`<tr><td colspan="9" class="empty"><p class="muted">No shifts this week.</p></td></tr>`;

  el.innerHTML=`<div class="card" style="padding:10px">
    <div class="flex between items-c" style="margin-bottom:10px">
      <button class="btn btn-outline btn-sm" onclick="fsWeekOffset--;renderFsBody()" ${fsWeekOffset<=0?'disabled':''}>← Prev</button>
      <span style="font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--navy)">${week.label}</span>
      <button class="btn btn-outline btn-sm" onclick="fsWeekOffset++;renderFsBody()" ${fsWeekOffset>=weeks.length-1?'disabled':''}>Next →</button>
    </div>
    <div style="overflow-x:auto">
      <table class="sg" style="min-width:700px"><thead>${th}</thead><tbody>${tb}</tbody></table>
    </div>
  </div>`;
}

function shiftCards(shifts, hideStatus){
  return shifts.map(s=>{
    const t=D.templates.find(x=>x.code===s.template_code);
    const p=D.posts.find(x=>x.id===s.post_id);
    const g=D.guards.find(x=>String(x.id)===String(s.assigned_guard_id));
    const d=new Date(ymd(s.date)+'T12:00:00');
    const hol=holiday(ymd(s.date)),we=isWE(ymd(s.date));
    const pc=postColor(s.post_id);
    const bc=hol?'#f59e0b':we?'#6366f1':pc;
    return`<div class="shift-card" style="border-color:${bc}22;border-left:3px solid ${bc}">
      <div class="sdate-block">
        <div class="sdate-day">${DAYS[d.getDay()]}</div>
        <div class="sdate-num">${d.getDate()}</div>
        <div class="sdate-mo">${MONTHS[d.getMonth()]}</div>
      </div>
      <div style="flex:1">
        <div style="font-weight:600;color:${pc}">${p?p.name:'—'} <span style="background:${pc}22;color:${pc};padding:2px 7px;border-radius:4px;font-size:.75rem;font-weight:700">${t?t.name:s.template_code||'—'}</span></div>
        <div class="muted mt1">${t&&t.start_time&&t.start_time!=='Custom'&&t.start_time!=='TBD'?`${fmtTime(t.start_time)} – ${fmtTime(t.end_time)} (${t.paid_hours}h)`:s.notes||''}</div>
        ${g?`<div style="color:var(--wave);font-size:.81rem;margin-top:2px"><span class="rank-dot" style="background:${RC[g.rank]||'#94a3b8'};width:6px;height:6px;display:inline-block;border-radius:50%;margin-right:3px;vertical-align:middle"></span>${g.name}</div>`:''}
      </div>
      ${!hideStatus?`<span class="badge b-${s.status}">${s.status}</span>`:''}
    </div>`;
  }).join('');
}

function renderShiftMgr(){
  const el=document.getElementById('smgr-table');if(!el)return;
  const tmpl=document.getElementById('smgr-tmpl')?.value||'';
  const post=document.getElementById('smgr-post')?.value||'';
  const openOnly=document.getElementById('smgr-open')?.checked||false;

  let shifts=[...D.shifts].filter(s=>s.status!=='cancelled');
  if(tmpl) shifts=shifts.filter(s=>s.template_code===tmpl);

  shifts.sort((a,b)=>a.date>b.date?1:-1);

  if(!shifts.length){el.innerHTML='<div class="empty" style="padding:30px"><div class="ei">📭</div><p>No shifts match.</p></div>';return;}

  el.innerHTML=`<table class="tbl">
    <thead><tr>

    </tr></thead>

      const p=D.posts.find(x=>x.id===s.post_id);
      const g=D.guards.find(x=>String(x.id)===String(s.assigned_guard_id));

        <td><span class="badge b-${s.status==='filled'?'approved':s.status==='open'?'open':'pending'}">${s.status}</span></td>
        <td style="font-size:.83rem">${g?`<span class="rank-dot" style="background:${RC[g.rank]||'#94a3b8'};width:6px;height:6px;display:inline-block;border-radius:50%;margin-right:3px;vertical-align:middle"></span>${g.name}`:'—'}</td>

function updateBcPreview(){
  const start=document.getElementById('bc-start')?.value;
  const end=document.getElementById('bc-end')?.value;
  const qty=parseInt(document.getElementById('bc-qty')?.value)||1;
  const dows=[...document.querySelectorAll('.bc-dow:checked')].map(c=>parseInt(c.value));
  const preview=document.getElementById('bc-preview');
  if(!start||!end||!dows.length){if(preview)preview.textContent='';return;}
  const s=new Date(start+'T12:00:00'),e=new Date(end+'T12:00:00');
  let days=0,cur=new Date(s);
  while(cur<=e){if(dows.includes(cur.getDay()))days++;cur.setDate(cur.getDate()+1);}
  if(preview)preview.textContent=`Will create ${days*qty} shift slot${days*qty!==1?'s':''} (${days} days × ${qty} slot${qty!==1?'s':''})`;
}

function showAddPeriodModal(){
  // Auto-calc availability deadline = 3 days before next period start
  // Try to guess from existing periods
  const sorted=[...D.periods].sort((a,b)=>ymd(a.start_date)>ymd(b.start_date)?1:-1);
  const last=sorted[sorted.length-1];
  let suggestStart='', suggestEnd='', suggestThru='', suggestDeadline='', suggestTRDue='', suggestPayroll='';
  if(last){
    // Guess next period starts day after last ends
    const lastEnd=new Date(ymd(last.end_date)+'T12:00:00');
    lastEnd.setDate(lastEnd.getDate()+1);
    suggestStart=ymd(lastEnd);
    // End = 15 days later typically
    const nextEnd=new Date(lastEnd);
    nextEnd.setDate(nextEnd.getDate()+14);
    suggestEnd=ymd(nextEnd);
    // Schedule through = next Friday after end
    const thru=new Date(nextEnd);
    while(thru.getDay()!==5)thru.setDate(thru.getDate()+1);
    suggestThru=ymd(thru);
    // Availability deadline = 3 days before start
    const dl=new Date(lastEnd);
    dl.setDate(dl.getDate()-3);
    suggestDeadline=ymd(dl);
  }
  showModal(`<div class="modal-title">💰 New Pay Period</div>
    <div class="row2">
      <div class="fg"><label>Pay Period Start</label><input type="date" id="pp-s" class="inp" value="${suggestStart}" onchange="autoCalcDeadline()"></div>
      <div class="fg"><label>Pay Period End</label><input type="date" id="pp-e" class="inp" value="${suggestEnd}"></div>
    </div>
    <div class="row2">
      <div class="fg"><label>Schedule Through (Fri)</label><input type="date" id="pp-t" class="inp" value="${suggestThru}"></div>
      <div class="fg"><label>Time Report Due</label><input type="date" id="pp-tr" class="inp" value="${suggestTRDue}"></div>
    </div>
    <div class="row2">
      <div class="fg"><label>Payroll Due</label><input type="date" id="pp-p" class="inp" value="${suggestPayroll}"></div>
      <div class="fg"><label>Availability Deadline <span class="muted" style="font-weight:400;font-size:.72rem">(auto: 3 days before start)</span></label>
        <input type="date" id="pp-a" class="inp" value="${suggestDeadline}">
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-navy" onclick="doCreatePeriod()">Create</button></div>`);
}

function autoCalcDeadline(){
  const start=document.getElementById('pp-s')?.value;
  if(!start)return;
  const d=new Date(start+'T12:00:00');
  d.setDate(d.getDate()-3);
  const dl=document.getElementById('pp-a');
  if(dl)dl.value=ymd(d);
}

const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function ymd(d){
  if(!d)return'';
  if(typeof d==='string'){
    if(/^\d{4}-\d{2}-\d{2}/.test(d))return d.slice(0,10);
    if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)){const[m,day,y]=d.split('/');return`${y}-${m.padStart(2,'0')}-${day.padStart(2,'0')}`;}
    return d;
  }
  const dt=d instanceof Date?d:new Date(d);
  return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function fd(s){if(!s)return'';const d=new Date(ymd(s)+'T12:00:00');return isNaN(d)?s:`${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;}
function fds(s){if(!s)return'';const d=new Date(ymd(s)+'T12:00:00');return isNaN(d)?s:`${MONTHS[d.getMonth()]} ${d.getDate()}`;}
function badge(id,count){const el=document.getElementById(id);if(!el)return;el.style.display=count>0?'inline':'none';el.textContent=count;}
function toast(msg,type='info'){
  const c=document.getElementById('toasts'),el=document.createElement('div');
  el.className=`toast${type==='ok'?' ok':type==='err'?' err':type==='warn'?' warn':''}`;
  el.textContent=msg;c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),320);},3200);
}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('mob-overlay').classList.toggle('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mob-overlay').classList.remove('open');}

function run(fn,success,fail,arg1,arg2,arg3){
  let call=google.script.run;
  if(success)call=call.withSuccessHandler(success);
  call=call.withFailureHandler(fail||(e=>console.error(fn,e)));
  if(arg1!==undefined&&arg2!==undefined&&arg3!==undefined)call[fn](arg1,arg2,arg3);
  else if(arg1!==undefined&&arg2!==undefined)call[fn](arg1,arg2);
  else if(arg1!==undefined)call[fn](arg1);
  else call[fn]();
}


// Guard run — prepends session token as first argument
function runG(fn,success,fail,...args){
  const tok=S?.token||null;
  let call=google.script.run;
  if(success)call=call.withSuccessHandler(success);
  call=call.withFailureHandler(fail||(e=>console.error(fn,e)));
  call[fn](tok,...args);
}
// Admin calls always prepend the session token as first argument
function arun(fn,success,fail,...args){
  const tok=S?.token||null;
  let call=google.script.run;
  if(success)call=call.withSuccessHandler(success);
  call=call.withFailureHandler(fail||(e=>console.error(fn,e)));
  call[fn](tok,...args);
}

const isMobile = () => {
  // Prefer touch + UA over iframe width (Apps Script iframe is narrow on desktop)
  const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
  const ua = navigator.userAgent.toLowerCase();
  const mobileUA = /android|iphone|ipad|ipod|mobile|blackberry|opera mini/i.test(ua);
  return hasTouch && mobileUA;
};

function mobGo(panel) {
  // Update tab bar
  document.querySelectorAll('.mob-tab').forEach(t => t.classList.remove('on'));
  const tab = document.getElementById('mobt-'+panel);
  if (tab) tab.classList.add('on');
  // Use the regular go() function
  go(panel);
}

function showMobTabs() {
  const tabs = document.getElementById('mob-tabs');
  const sidebar = document.getElementById('sidebar');
  const isGuardMobile = !isTrueAdmin() && isMobile();
  if (tabs) tabs.style.display = isGuardMobile ? 'flex' : 'none';
  // Hide sidebar entirely for guards on mobile (they use bottom tabs)
  // Admins on mobile get the hamburger + slide-in sidebar
  if (sidebar) {
    if (isGuardMobile) {
      sidebar.classList.add('guard-mobile');
    } else {
      sidebar.classList.remove('guard-mobile');
    }
  }
}

function openAvailSheet(ds, currentStatus) {
  const dayShifts=D.shifts.filter(s=>s.date===ds&&s.status!=='cancelled');
  const opts = Object.entries(AV_LABELS).map(([k,v]) => {
    let hasMatch=true;
    if(k==='S_8HR'||k==='S_8HR_OT') hasMatch=dayShifts.some(s=>s.template_code==='8HR');
    else if(k==='S_LS8') hasMatch=dayShifts.some(s=>s.template_code==='LS8');
    else if(k==='S_LSO') hasMatch=dayShifts.some(s=>s.template_code==='LSO');
    else if(k==='S_SPEC') hasMatch=dayShifts.some(s=>s.template_code==='SPEC');
    const isOff=['FLEX_OFF','FIXED_OFF'].includes(k);
    const disabled=!isOff&&!hasMatch;
    // Always clickable — dim if no slots but don't block
    return `<button class="av-opt-btn${currentStatus===k?' selected':''}" onclick="setMobAvail('${ds}','${k}')" style="${disabled?'opacity:.55':''}">
      <div class="av-opt-dot" style="background:${AV_COLORS[k]}"></div>
      <div class="av-opt-label">${AV_LATE.has(k)?'🌙 ':''}${v}${disabled?' <span style="font-size:.68rem;color:var(--muted)">— no slots yet</span>':''}</div>
      ${currentStatus===k?'<div class="av-opt-check">✓</div>':''}
    </button>`;
  }).join('');

  const d = new Date(ds+'T12:00:00');
  openBSheet(`${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}`, opts);
}

function setMobAvail(ds, status) {
  const gid = String(myId());
  const existing = D.avail.find(a => String(a.guard_id)===gid && a.date===ds);

  // LS10 = both LS8 and LSO
  const entries = status === 'S_LS10'
    ? [{guard_id:gid,date:ds,status:'S_LS8',custom_start:'',custom_end:'',ot_willing:false,notes:''},
       {guard_id:gid,date:ds+'_lso',status:'S_LSO',custom_start:'',custom_end:'',ot_willing:false,notes:''}]
    : [{guard_id:gid,date:ds,status,custom_start:existing?.custom_start||'',custom_end:existing?.custom_end||'',ot_willing:false,notes:''}];

  mobAvailChanges[ds] = entries;

  // Update UI row immediately
  const rows = document.getElementById('mob-av-list');
  if (rows) {
    const row = rows.querySelector(`[onclick*="'${ds}'"]`);
    if (row) {
      const chip = row.querySelector('.g-av-chip');
      if (chip) {
        chip.className = `g-av-chip av-${status}`;
        chip.innerHTML = (AV_LATE.has(status)?'🌙 ':'')+AV_LABELS[status];
      }
    }
  }
  const statusEl = document.getElementById('mob-av-status');
  if (statusEl) statusEl.textContent = `${Object.keys(mobAvailChanges).length} unsaved change${Object.keys(mobAvailChanges).length!==1?'s':''}`;
  closeBSheet();
}

function saveMobAvail() {
  const allEntries = Object.values(mobAvailChanges).flat();
  if (!allEntries.length) { toast('No changes to save.','warn'); return; }
  const btn = document.querySelector('[onclick="saveMobAvail()"]');
  const icon = document.getElementById('mob-av-save-icon');
  if (btn) btn.disabled = true;
  if (icon) icon.innerHTML = '<span class="spinner"></span>';
  runG('clientSubmitAvailability', r => {
    if (btn) btn.disabled = false;
    if (icon) icon.textContent = '💾';
    if (r && r.success) {
      toast('Availability saved!','ok');
      allEntries.forEach(e => {
        const idx = D.avail.findIndex(a => String(a.guard_id)===String(e.guard_id) && a.date===e.date);
        if (idx>=0) D.avail[idx] = {...D.avail[idx],...e}; else D.avail.push(e);
      });
      mobAvailChanges = {};
      const statusEl = document.getElementById('mob-av-status');
      if (statusEl) { statusEl.style.color='var(--green)'; statusEl.textContent='✓ Saved'; setTimeout(()=>statusEl.textContent='',3000); }
    } else toast(r?.message||'Failed.','err');
  }, null, allEntries);
}

// ── MOBILE: FULL SCHEDULE ─────────────────────────
function renderMobFullSchedule() {
  const el = document.getElementById('content');
  if (!D.activePeriod) { el.innerHTML = '<p class="muted">No active pay period.</p>'; return; }

  const today = ymd(new Date());
  const assigned = D.shifts.filter(s => s.status!=='cancelled' && s.assigned_guard_id);

  if (!assigned.length) {
    el.innerHTML = '<div class="empty"><div class="ei">📭</div><p>No shifts published yet.</p></div>';
    return;
  }

  const RANK_ORDER = ['Lifeguard Supervisor','Crew Captain','Captain','Beach Captain','Lieutenant','Vet','Guard','Rookie','Replacement','Volunteer'];
  const rankIdx = r => { const i=RANK_ORDER.indexOf(r); return i<0?99:i; };

  // Group by date, then by post within each date
  const dates = dateRange(D.activePeriod.start_date, D.activePeriod.schedule_thru)
    .filter(d => assigned.some(s => s.date===ymd(d)));

  let html = `<div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn btn-outline btn-sm on" id="fs-list-btn" onclick="fsMobView('list')">📋 List</button>
    <button class="btn btn-outline btn-sm" id="fs-grid-btn" onclick="fsMobView('grid')">📅 Grid</button>
  </div>
  <div id="fs-mob-content">`;

  dates.forEach(d => {
    const ds = ymd(d), hol = holiday(ds), we = isWE(ds), isT = ds===today, isSat = d.getDay()===6;
    const dayShifts = assigned.filter(s => s.date===ds);
    if (!dayShifts.length) return;

    const borderTop = isSat ? 'border-top:3px solid var(--ocean);' : '';
    const bg = isT ? '#e0f2fe' : hol ? '#fffbeb' : we ? '#f8fafc' : '#fff';

    html += `<div style="background:${bg};border-radius:10px;margin-bottom:8px;overflow:hidden;${borderTop}border:1px solid var(--border)">
      <div style="padding:8px 12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;color:var(--navy);border-bottom:1px solid var(--border)">
        ${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}${hol?' 🏖':''}${isT?' <span style="color:var(--wave)">Today</span>':''}
      </div>`;

    // Group by post
    const sortedPosts = [...D.posts].sort((a,b)=>(parseFloat(a.sort_order)||99)-(parseFloat(b.sort_order)||99));
    sortedPosts.forEach(post => {

// Live clock interval handle
let _clockInterval = null;
let _widgetInterval = null;

function startLiveClock(clockInISO) {
  stopLiveClock();
  _clockInterval = setInterval(() => {
    const elapsed = document.getElementById('clock-elapsed');
    const liveTime = document.getElementById('clock-live-time');
    if (liveTime) {
      liveTime.textContent = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
    }
    if (elapsed && clockInISO) {
      const secs = Math.floor((Date.now() - new Date(clockInISO)) / 1000);
      const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
      elapsed.textContent = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
  }, 1000);
}

function stopLiveClock() {
  if (_clockInterval) { clearInterval(_clockInterval); _clockInterval = null; }

// Stop live clock when leaving time page
// Live clock is stopped in go() directly — see go() function above

function loadMyTimeRecords(periodId) {
  const el = document.getElementById('my-time-records');
  if (!el) return;
  const targetId = IMPERSONATE ? IMPERSONATE.id : null;

  const period = D.activePeriod;
  const periodStart = period ? ymd(new Date(period.start_date+'T12:00:00')) : null;
  const periodEnd   = period ? ymd(new Date((period.end_date||period.schedule_thru)+'T12:00:00')) : null;

  // Expand to full Sat-Fri weeks that overlap the pay period
  function weekSat(dateStr) {
    const d = new Date(dateStr+'T12:00:00');
    const day = d.getDay();
    d.setDate(d.getDate() + (day === 6 ? 0 : -(day+1)));
    return ymd(d);
  }
  function weekFri(dateStr) {
    const d = new Date(dateStr+'T12:00:00');
    const day = d.getDay();
    d.setDate(d.getDate() + (day === 5 ? 0 : (5-day)));
    return ymd(d);
  }

  const fetchStart = periodStart ? weekSat(periodStart) : null;
  const fetchEnd   = periodEnd   ? weekFri(periodEnd)   : null;

  const handler = records => {
    if (!records || !records.length) {
      el.innerHTML = '<div class="empty" style="padding:16px"><div class="ei">⏱</div><p>No time records for this period.</p></div>';
      return;
    }

    // Group into Sat-Fri weeks
    const weeks = {};
    records.forEach(r => {
      const d = new Date(r.date+'T12:00:00');
      // Find the Saturday that starts this week
      const day = d.getDay(); // 0=Sun...6=Sat
      const diff = day === 6 ? 0 : -(day + 1); // days back to Saturday
      const sat = new Date(d);
      sat.setDate(d.getDate() + diff);
      const wk = ymd(sat);
      if (!weeks[wk]) weeks[wk] = { sat, records: [] };
      weeks[wk].records.push(r);
    });

    // Pay period totals — only records within the pay period dates
    const periodRecs = periodStart && periodEnd
      ? records.filter(r => r.date >= periodStart && r.date <= periodEnd)
      : records;
    const ppMins = periodRecs.reduce((s,r)=>s+roundQtr(parseInt(r.total_minutes)||0),0);
    const ppHrs  = ppMins / 60;
    const periodReg = Math.min(ppHrs, 40);
    const periodOT  = Math.max(0, ppHrs - 40);

    const weekBlocks = Object.keys(weeks).sort().map(wk => { // oldest week first
      const { sat, records: wkRecs } = weeks[wk];
      const fri = new Date(sat); fri.setDate(sat.getDate()+6);
      const sorted = [...wkRecs].sort((a,b) => a.date > b.date ? 1 : -1); // oldest first within week
      const wkMins = wkRecs.reduce((s,r)=>s+roundQtr(parseInt(r.total_minutes)||0),0);
      const wkHrs  = wkMins / 60;
      const otHrs  = Math.max(0, wkHrs - 40);

      const rows = sorted.map(r => {
        const d   = new Date(r.date+'T12:00:00');
        const cin  = r.clock_in  ? fmtISOTime(r.clock_in)  : '—';
        const cout = r.clock_out ? fmtISOTime(r.clock_out) : `<span style="color:var(--coral)">In Progress</span>`;
        const mins = roundQtr(parseInt(r.total_minutes)||0);
        const hrs  = (mins/60).toFixed(2);
        const brk  = parseInt(r.break_minutes)||0;
        const canEdit = r.locked !== 'true';
        return `<div class="time-record-row">
          <div class="tr-date">${DAYS[d.getDay()]}<br>${MONTHS[d.getMonth()]} ${d.getDate()}</div>

            ${r.auto_clocked_out==='true'?`<div style="font-size:.72rem;color:var(--coral)">⚠️ Auto clocked out — please edit</div>`:''}
          </div>
          <div style="text-align:right">
            <div class="tr-hours">${r.status==='open'?'—':hrs+'h'}</div>
            ${r.edited==='true'?'<div class="tr-edited">edited</div>':''}
            ${r.locked==='true'?'<div class="tr-locked">🔒</div>':''}
            ${canEdit&&r.status!=='open'?`<button class="btn btn-outline btn-xs" style="font-size:.68rem;padding:2px 6px;margin-top:3px" onclick="showGuardEditTime('${r.id}','${r.date}')">Edit</button>`:''}
          </div>
        </div>`;
      }).join('');

      return `<div style="margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:2px solid var(--navy);margin-bottom:2px">
          <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;color:var(--navy)">
            Week of ${MONTHS[sat.getMonth()]} ${sat.getDate()} – ${MONTHS[fri.getMonth()]} ${fri.getDate()}
          </div>
          <div style="font-size:.82rem;text-align:right">
            <span style="font-weight:700;color:var(--navy)">${wkHrs.toFixed(2)}h total</span>
            ${otHrs>0?`<span style="color:var(--coral);margin-left:8px;font-weight:700">${otHrs.toFixed(2)}h OT</span>`:''}
          </div>
        </div>
        ${rows}
      </div>`;
    }).join('');

    const periodTotal = periodReg + periodOT;
    const periodLabel = D.activePeriod
      ? `Pay Period: ${fd(D.activePeriod.start_date)} – ${fd(D.activePeriod.end_date)}`
      : 'Pay Period';
    el.innerHTML = `
      <div style="margin-bottom:16px;background:var(--navy);border-radius:10px;padding:12px 14px">
        <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.5);margin-bottom:8px">${periodLabel}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
          <div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:800;color:#fff">${periodTotal.toFixed(2)}h</div>
            <div style="font-size:.65rem;color:rgba(255,255,255,.55);text-transform:uppercase">Total</div>
          </div>
          <div>
            <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:800;color:#fff">${periodReg.toFixed(2)}h</div>
            <div style="font-size:.65rem;color:rgba(255,255,255,.55);text-transform:uppercase">Regular</div>

          </div>
        </div>
      </div>
      ${weekBlocks}`;
  };

  if (fetchStart && fetchEnd) {

}

  function toISO(t) {
    const [h,m] = t.split(':').map(Number);
    const d = new Date(dateStr+'T12:00:00');
    d.setHours(h,m,0,0);
    return d.toISOString();
  }
  const clockIn  = toISO(inVal);
  const clockOut = toISO(outVal);
  const totalMins = Math.max(0, Math.round((new Date(clockOut)-new Date(clockIn))/60000) - breakVal);

// Round minutes to nearest 15
function roundQtr(mins) { return Math.round(mins/15)*15; }

// Format ISO timestamp to readable time
function fmtISOTime(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  } catch(e) { return iso; }
}

// Get shift label from shift_id
function getShiftLabel(shiftId) {
  const s = D.shifts.find(x => x.id === shiftId);
  if (!s) return 'Unknown shift';
  const t = D.templates.find(x => x.code === s.template_code);
  const p = D.posts.find(x => x.id === s.post_id);
  return `${t?t.name:s.template_code}${p?' @ '+p.name:''}`;
}

// ── GEOLOCATION ──────────────────────────────────────────────
let _cachedLoc = null;

function getLocationForClock(cb) {
  if (!navigator.geolocation) {
    cb({ error: 'Geolocation not supported', lat: null, lng: null, dist_ft: null });
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      _cachedLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      // Calculate distance from HQ using rough formula client-side for display
      // (server calculates precise distance on save)
      cb({ lat: _cachedLoc.lat, lng: _cachedLoc.lng, dist_ft: null, error: null });
    },
    err => {
      _cachedLoc = null;
      const msg = err.code === 1 ? 'Location access denied'
                : err.code === 2 ? 'Location unavailable'
                : 'Location timed out';
      cb({ error: msg, lat: null, lng: null, dist_ft: null });
    },
    { timeout: 8000, maximumAge: 60000, enableHighAccuracy: true }
  );
}

  const btn = document.getElementById('clock-action-btn');

          const newStatus = { clocked_in: true, record: { ...r, clock_in: r.clock_in }, clock_in: r.clock_in };

function confirmClockOut() {
  const inVal    = document.getElementById('co-in')?.value;
  const timeVal  = document.getElementById('co-time')?.value;
  const breakVal = document.getElementById('co-break')?.value;
  const notes    = document.getElementById('co-notes')?.value || '';
  const targetId = IMPERSONATE ? IMPERSONATE.id : null;

  if (!timeVal) { toast('Clock-out time is required.','err'); return; }

  const now = new Date();
  const status = IMPERSONATE ? IMPERSONATE_CLOCK_STATUS : CLOCK_STATUS;
  const rec = status.record;

  // Clock-out override
  let clockOutOverride = null;
  if (timeVal) {
    const [h,m] = timeVal.split(':').map(Number);
    const override = new Date(now);
    override.setHours(h, m, 0, 0);
    if (override > now) override.setTime(now.getTime());
    clockOutOverride = override.toISOString();
  }

  // Clock-in override — if user changed it from the original
  let clockInOverride = null;
  if (inVal && rec?.clock_in) {
    const origInVal = new Date(rec.clock_in).toTimeString().slice(0,5);
    if (inVal !== origInVal) {
      const [h,m] = inVal.split(':').map(Number);
      const d = new Date(rec.clock_in);
      d.setHours(h, m, 0, 0);
      clockInOverride = d.toISOString();
    }
  }

  const btn = document.querySelector('[onclick="confirmClockOut()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  getLocationForClock(loc => {
    run('clientClockOut', r => {
      closeModal();
      if (r && r.success) {
        const hrs = (roundQtr(r.total_minutes) / 60).toFixed(2);
        if (IMPERSONATE) {
          IMPERSONATE_CLOCK_STATUS = { clocked_in: false, record: null };
          toast(`Clocked out ${IMPERSONATE.name} — ${hrs}h recorded`, 'ok');
          if (PANEL === 'time') renderImpersonateTimePage(document.getElementById('content'));
          else refreshClockWidget();
        } else {
          CLOCK_STATUS = { clocked_in: false, record: null };
          toast(`Clocked out — ${hrs}h recorded 👋`, 'ok');
          if (PANEL === 'time') renderTimePage(document.getElementById('content'));
          else refreshClockWidget();
        }
      } else {
        toast(r?.message || 'Clock-out failed.', 'err');
      }
    }, null, {
      lat: loc.lat,
      lng: loc.lng,
      clock_in_override: clockInOverride,
      clock_out_override: clockOutOverride,
      break_minutes: breakVal !== '' ? parseInt(breakVal)||0 : undefined,
      notes,
      target_guard_id: targetId,
      token: S?.token
    });
  });
}

// Compute weekly OT breakdown from records array
// Build merged day entries: actual time records + projected future shifts
function buildDayEntries(guardId) {
  const today = ymd(new Date());
  const records = _allTimeRecords.filter(r => String(r.guard_id) === String(guardId));

  // Dates already covered by a real record
  const coveredDates = new Set(records.map(r => toDateStr(r.date)));

  // Future assigned shifts with no time record yet
  const futureShifts = D.shifts.filter(s =>
    String(s.assigned_guard_id) === String(guardId) &&
    s.status !== 'cancelled' &&
    toDateStr(s.date) > today &&
    !coveredDates.has(toDateStr(s.date))
  );

  // Build unified list: type 'actual' or 'projected'
  const entries = [
    ...records.map(r => ({ type:'actual', date: toDateStr(r.date), record: r })),
    ...futureShifts.map(s => {
      const t = D.templates.find(x => x.code === s.template_code);
      const hrs = t ? parseFloat(t.paid_hours)||0 : 0;
      return { type:'projected', date: toDateStr(s.date), shift: s, template: t, hrs };
    })
  ];

  return entries.sort((a,b) => a.date > b.date ? 1 : -1);
}

function toDateStr(val) {
  if (!val) return '';
  const s = String(val);
  // Already YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // Try parsing as date
  try { return ymd(new Date(s)); } catch(e) { return s; }
}

// weeklyOT now accepts merged day entries
function weeklyOT(entries) {
  const weeks = {};
  entries.forEach(e => {
    const d = new Date(e.date+'T12:00:00');
    const day = d.getDay();
    const diff = day === 6 ? 0 : -(day+1);
    const sat = new Date(d); sat.setDate(d.getDate()+diff);
    const wk = ymd(sat);
    if (!weeks[wk]) weeks[wk] = { total:0, reg:0, ot:0 };
    if (e.type === 'actual') {
      weeks[wk].total += roundQtr(parseInt(e.record?.total_minutes)||0) / 60;
    } else {
      weeks[wk].total += e.hrs;
    }
  });
  Object.values(weeks).forEach(w => {
    w.reg = Math.min(w.total, 40);
    w.ot  = Math.max(0, w.total - 40);
  });
  return weeks;
}

// weeklyOT for plain records array (summary view still uses this)
function weeklyOTRecords(records) {
  return weeklyOT(records.map(r => ({ type:'actual', date: toDateStr(r.date), record: r })));
}

function renderAdminTimeDrill(guardId) {
  const el = document.getElementById('admin-time-table'); if (!el) return;
  const guard = D.guards.find(g => String(g.id) === String(guardId));
  const rc = RC[guard?.rank]||'#94a3b8';

  // Merge actual + projected
  const entries = buildDayEntries(guardId);
  const wkMap = weeklyOT(entries);
  let gTotal=0, gReg=0, gOT=0;
  Object.values(wkMap).forEach(w=>{ gTotal+=w.total; gReg+=w.reg; gOT+=w.ot; });

  // Group into Sat-Fri weeks, oldest first
  const weeks = {};
  entries.forEach(e => {
    const d = new Date(e.date+'T12:00:00');
    const day = d.getDay();
    const diff = day===6?0:-(day+1);
    const sat = new Date(d); sat.setDate(d.getDate()+diff);
    const wk = ymd(sat);
    if (!weeks[wk]) weeks[wk] = { sat, entries:[] };
    weeks[wk].entries.push(e);
  });

  const today = ymd(new Date());

  const weekBlocks = Object.keys(weeks).sort().map(wk => {
    const { sat, entries: wkEntries } = weeks[wk];
    const fri = new Date(sat); fri.setDate(sat.getDate()+6);
    const wkHrs = Object.values(weeklyOT(wkEntries)).reduce((s,w)=>s+w.total,0);
    const wkReg = Math.min(wkHrs,40), wkOT = Math.max(0,wkHrs-40);
    const hasProjected = wkEntries.some(e=>e.type==='projected');

    const rows = wkEntries.map(e => {
      const d = new Date(e.date+'T12:00:00');
      const isFuture = e.date > today;

      if (e.type === 'projected') {
        const p = D.posts.find(x => x.id === e.shift.post_id);
        const pc = postColor(e.shift.post_id);
        return `<div class="time-record-row" style="padding:8px 0;opacity:.72;background:repeating-linear-gradient(90deg,transparent,transparent 4px,#f8fafc 4px,#f8fafc 8px)">
          <div class="tr-date" style="color:var(--muted)">${DAYS[d.getDay()]}<br>${MONTHS[d.getMonth()]} ${d.getDate()}</div>
          <div class="tr-times" style="flex:1">
            <div style="font-size:.83rem;color:var(--muted)">
              <span style="background:${pc}22;color:${pc};padding:1px 6px;border-radius:4px;font-size:.75rem;font-weight:700">${e.template?e.template.name:e.shift.template_code}</span>
              ${p?`<span style="font-size:.75rem;color:var(--muted)"> @ ${p.name}</span>`:''}
            </div>
            <div style="font-size:.72rem;color:var(--muted)">${e.template&&e.template.start_time?fmtTime(e.template.start_time)+' – '+fmtTime(e.template.end_time):''}</div>
          </div>
          <div style="min-width:60px;text-align:right">
            <div class="tr-hours" style="color:var(--muted)">${e.hrs.toFixed(2)}h</div>
            <div style="font-size:.65rem;color:var(--muted);font-style:italic">projected</div>
          </div>
        </div>`;
      }

      // Actual record
      const r = e.record;
      const cin  = r.clock_in  ? fmtISOTime(r.clock_in)  : '—';
      const cout = r.clock_out ? fmtISOTime(r.clock_out) : '<span style="color:var(--coral)">Open</span>';
      const mins = roundQtr(parseInt(r.total_minutes)||0);
      const isLocked = r.locked==='true';
      const isEdited = r.edited==='true';
      const isAuto   = r.auto_clocked_out==='true';
      return `<div class="time-record-row" style="padding:8px 0">
        <div class="tr-date">${DAYS[d.getDay()]}<br>${MONTHS[d.getMonth()]} ${d.getDate()}</div>
        <div class="tr-times" style="flex:1">
          <div style="font-size:.83rem">${cin} → ${cout}</div>
          <div style="font-size:.72rem;color:var(--muted)">Break: ${parseInt(r.break_minutes)||0}min${r.status==='open'?'':' · '+(mins/60).toFixed(2)+'h'}</div>
          ${isAuto?'<div style="font-size:.7rem;color:var(--coral)">⚠️ Auto clocked out</div>':''}
          ${isEdited?`<div class="tr-edited">✏️ Edited${r.edited_by?' by '+r.edited_by:''}</div>`:''}
          ${r.notes?`<div style="font-size:.7rem;color:var(--muted)">${r.notes}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;align-items:flex-end;min-width:60px">
          <div class="tr-hours">${r.status==='open'?'—':(mins/60).toFixed(2)+'h'}</div>
          ${isLocked
            ? '<span style="font-size:.68rem;color:var(--muted)">🔒</span>'
            : `<button class="btn btn-outline btn-xs" style="font-size:.68rem;padding:2px 6px" onclick="showEditTimeRecord('${r.id}')">Edit</button>`}
          ${!isLocked?`<button class="btn btn-xs" style="font-size:.68rem;padding:2px 6px;background:var(--foam);color:var(--muted)" onclick="toggleLockRecord('${r.id}',true)">Lock</button>`:''}
        </div>
      </div>`;
    }).join('');

    return `<div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:2px solid var(--navy);margin-bottom:2px">
        <div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;color:var(--navy)">
          Week of ${MONTHS[sat.getMonth()]} ${sat.getDate()} – ${MONTHS[fri.getMonth()]} ${fri.getDate()}
          ${hasProjected?'<span style="font-size:.7rem;color:var(--muted);font-weight:400;margin-left:6px">includes projected</span>':''}
        </div>
        <div style="font-size:.82rem;text-align:right">
          <span style="font-weight:700;color:var(--navy)">${wkHrs.toFixed(2)}h</span>
          ${wkOT>0?`<span style="color:var(--coral);margin-left:8px">${wkOT.toFixed(2)}h OT</span>`:''}
        </div>
      </div>
      ${rows}
      <div style="display:flex;gap:16px;padding:5px 0;font-size:.78rem;color:var(--muted);border-top:1px solid var(--border)">
        <span>Reg: <strong style="color:var(--text)">${wkReg.toFixed(2)}h</strong></span>
        ${wkOT>0?`<span>OT: <strong style="color:var(--coral)">${wkOT.toFixed(2)}h</strong></span>`:''}
        <span>Total: <strong style="color:var(--navy)">${wkHrs.toFixed(2)}h</strong></span>
      </div>
    </div>`;
  }).join('');

  const hasAnyProjected = entries.some(e=>e.type==='projected');

  el.innerHTML = `
    <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center">
      <button class="btn btn-outline btn-sm" onclick="backToSummary()">← All Guards</button>
      <button class="btn btn-navy btn-sm" onclick="showAddManualTimeRecord('${guardId}')">+ Add Manual Record</button>
    </div>
    <div class="card" style="margin-bottom:12px;padding:12px 14px">
      <div class="flex items-c gap2" style="margin-bottom:${hasAnyProjected?'8':'0'}px">
        <div style="width:4px;height:32px;background:${rc};border-radius:2px"></div>
        <div>
          <div style="font-weight:700;font-size:1.05rem">${guard?guard.name:'Unknown'}</div>
          <div style="font-size:.78rem;color:var(--muted)">${guard?.rank||''}</div>
        </div>
        <div style="margin-left:auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
          <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;color:var(--navy)">${gTotal.toFixed(2)}h</div><div style="font-size:.65rem;color:var(--muted);text-transform:uppercase">Total</div></div>
          <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;color:var(--navy)">${gReg.toFixed(2)}h</div><div style="font-size:.65rem;color:var(--muted);text-transform:uppercase">Regular</div></div>
          <div><div style="font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:800;color:${gOT>0?'var(--coral)':'var(--navy)'}"">${gOT.toFixed(2)}h</div><div style="font-size:.65rem;color:var(--muted);text-transform:uppercase">OT</div></div>
        </div>
      </div>
      ${hasAnyProjected?'<div style="font-size:.73rem;color:var(--muted);border-top:1px solid var(--border);padding-top:6px">⚠️ Totals include projected hours from future scheduled shifts. Striped rows = not yet worked.</div>':''}
    </div>
    <div class="card" style="padding:14px">${weekBlocks||'<div class="empty"><div class="ei">⏱</div><p>No records or shifts.</p></div>'}</div>`;
}

function showAddManualTimeRecord(guardId) {
  const guard = D.guards.find(g => String(g.id) === String(guardId));
  // Default to yesterday if today already has records, else today
  const today = ymd(new Date());
  const yesterday = ymd(new Date(Date.now() - 86400000));
  const hasToday = _allTimeRecords.some(r =>
    String(r.guard_id) === String(guardId) && toDateStr(r.date) === today
  );

      <div class="fg"><label>Clock Out</label><input type="time" id="mtr-out" class="inp" value="17:15"></div>
    </div>

      <button class="btn btn-navy" onclick="saveManualTimeRecord('${guardId}')">Save Record</button>
    </div>`);
}

function saveManualTimeRecord(guardId) {
  const dateVal  = document.getElementById('mtr-date')?.value;
  const inVal    = document.getElementById('mtr-in')?.value;
  const outVal   = document.getElementById('mtr-out')?.value;
  const breakVal = parseInt(document.getElementById('mtr-break')?.value)||0;
  const notes    = document.getElementById('mtr-notes')?.value||'';

  if (!dateVal||!inVal||!outVal) { toast('Date, clock-in and clock-out are required.','err'); return; }

  function toISO(t) {
    const [h,m] = t.split(':').map(Number);
    const d = new Date(dateVal+'T12:00:00');
    d.setHours(h,m,0,0);
    return d.toISOString();
  }

  const clockIn  = toISO(inVal);
  const clockOut = toISO(outVal);
  if (new Date(clockOut) <= new Date(clockIn)) { toast('Clock-out must be after clock-in.','err'); return; }

  const btn = document.querySelector('[onclick*="saveManualTimeRecord"]');
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }

  arun('clientAddManualTimeRecord', r => {
    if (r && r.success) {
      toast('Manual record added.','ok');
      closeModal();
      // Reload and re-drill
      arun('clientGetTimeRecords', records => {
        _allTimeRecords = records || [];
        renderAdminTimeDrill(guardId);
      }, null, D.activePeriod?.id);
    } else {
      if (btn) { btn.disabled=false; btn.textContent='Save Record'; }
      toast(r?.message||'Failed.','err');
    }
  }, null, { guard_id: guardId, date: dateVal, clock_in: clockIn, clock_out: clockOut, break_minutes: breakVal, notes });
}

function showEditTimeRecord(id) {
  const r = _allTimeRecords.find(x => x.id === id);
  if (!r) return;
  const cin  = r.clock_in  ? new Date(r.clock_in).toTimeString().slice(0,5)  : '';
  const cout = r.clock_out ? new Date(r.clock_out).toTimeString().slice(0,5) : '';
  showModal(`<div class="modal-title">✏️ Edit Time Record</div>
    <div style="font-size:.82rem;color:var(--muted);margin-bottom:12px">${fd(r.date)} · ${D.guards.find(g=>String(g.id)===String(r.guard_id))?.name||r.guard_id}</div>
    <div class="row2">
      <div class="fg"><label>Clock In</label><input type="time" id="etr-in" class="inp" value="${cin}"></div>
      <div class="fg"><label>Clock Out</label><input type="time" id="etr-out" class="inp" value="${cout}"></div>
    </div>
    <div class="fg"><label>Break (minutes)</label><input type="number" id="etr-break" class="inp" value="${parseInt(r.break_minutes)||0}"></div>
    <div class="fg"><label>Notes</label><input type="text" id="etr-notes" class="inp" value="${r.notes||''}"></div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-navy" onclick="saveEditTimeRecord('${id}','${r.date}')">Save</button>
    </div>`);
}

function saveEditTimeRecord(id, dateStr) {
  const inVal    = document.getElementById('etr-in')?.value;
  const outVal   = document.getElementById('etr-out')?.value;
  const breakVal = parseInt(document.getElementById('etr-break')?.value)||0;
  const notes    = document.getElementById('etr-notes')?.value||'';

  function toISO(timeStr) {
    if (!timeStr) return '';
    const [h,m] = timeStr.split(':').map(Number);
    const d = new Date(dateStr+'T12:00:00');
    d.setHours(h,m,0,0);
    return d.toISOString();
  }

  arun('clientEditTimeRecord', r => {
    if (r && r.success) {
      toast('Time record updated.','ok');
      closeModal();
      loadAdminTimeRecords(D.activePeriod?.id);
    } else toast(r?.message||'Failed.','err');
  }, null, { id, clock_in: toISO(inVal), clock_out: toISO(outVal), break_minutes: breakVal, notes });
}

function toggleLockRecord(id, lock) {
  arun('clientLockTimeRecord', r => {
    if (r&&r.success) { toast(lock?'Record locked.':'Record unlocked.', 'warn'); loadAdminTimeRecords(D.activePeriod?.id); }
  }, null, id, lock);
}

function lockPeriodTime() {
  if (!confirm('Lock all time records for this pay period? This cannot be undone without admin access.')) return;
  arun('clientLockPeriodTimeRecords', r => {
    if (r&&r.success) { toast(`Locked ${r.count} records.`,'warn'); loadAdminTimeRecords(D.activePeriod?.id); }
  }, null, D.activePeriod?.id);
}

function exportTimeCSV() {
  arun('clientExportTimeRecordsCSV', r => {
    if (!r||!r.success) { toast('Export failed.','err'); return; }
    const blob = new Blob([r.csv], {type:'text/csv'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = `time_records_${r.period}.csv`; a.click();
    URL.revokeObjectURL(url);
    toast('CSV downloaded!','ok');
  }, null, D.activePeriod?.id);
}

// ── Load pending stats alerts ─────────────────────────────────
function loadPendingStats(cb) {
  runG('clientGetPendingStatsAlerts', r => {
    PENDING_STATS = (r||[]).filter(rec => {
      const snooze = SNOOZED_STATS[rec.id];
      if (!snooze) return true;
      return snooze <= ymd(new Date()); // snooze expired
    });
    if (cb) cb();
    refreshStatsAlerts();
  });
}

function refreshStatsAlerts() {
  // Re-render dashboard alerts if on dashboard

// ── Stats alert banner (shown on guard dashboard) ─────────────
function renderStatsAlerts() {
  if (!PENDING_STATS.length) return '';
  return PENDING_STATS.map(rec => {
    const d = new Date(rec.date+'T12:00:00');

      ${numField('firstaid','First Aid')}
    </div>
    ${numField('incidents','Incidents')}
    <div class="fg" style="margin-bottom:4px">
      <label style="font-size:.75rem">10-55 (Missing Person)</label>
      <input type="number" id="ss-ten55" class="inp" value="0" min="0" style="width:80px">
    </div>
    ${numField('ten24','10-24 (Alcohol/Drugs/Intoxicated)')}
    ${numField('ten34','10-34 (Fight Between Patrons)')}
    ${numField('harassment','Patron Harassing Lifeguards')}
    ${numField('vandalism','Vandalism')}

    <div style="font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px">Training</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 16px">${trainingChecks}</div>

    <div style="font-family:'Barlow Condensed',sans-serif;font-size:.85rem;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 6px">Conditions & Weather</div>
    <div class="row2">
      <div class="fg"><label>Surf Condition</label>
        <select id="ss-surf" class="sel"><option value="">Select…</option>${SURF_CONDITIONS.map(s=>`<option>${s}</option>`).join('')}</select>
      </div>
      <div class="fg"><label>Dominant Wind</label>
        <select id="ss-wind" class="sel"><option value="">Select…</option>${WIND_DIRECTIONS.map(s=>`<option>${s}</option>`).join('')}</select>
      </div>
    </div>
    <div class="row2">
      <div class="fg"><label>Air Temp (°F)</label>
        <input type="number" id="ss-temp" class="inp" placeholder="e.g. 82">
      </div>
      <div class="fg"><label>Weather</label>
        <select id="ss-weather" class="sel"><option value="">Select…</option>${WEATHER_OPTIONS.map(s=>`<option>${s}</option>`).join('')}</select>
      </div>
    </div>
    <div class="fg"><label>Flags Flown</label>
      <div style="margin-top:4px;display:grid;grid-template-columns:1fr 1fr;gap:2px">${flagChecks}</div>
    </div>
    <div class="fg"><label>Notes</label>
      <textarea id="ss-notes" class="inp" rows="2" placeholder="Any additional notes…"></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-navy" onclick="submitStatsForm('${rec.id}','${rec.date||ymd(new Date())}','${rec.shift_id||''}')">Submit Stats</button>
    </div>`, true); // true = wide modal
}

function toggleShiftOther(val) {
  const other = document.getElementById('ss-shift-other');
  if (other) other.style.display = val === 'other' ? 'block' : 'none';
}

function toggleDesc(id, val) {
  const wrap = document.getElementById(`ss-${id}-desc-wrap`);
  if (wrap) wrap.style.display = parseInt(val) > 0 ? 'block' : 'none';
}

function submitStatsForm(timeRecordId, date, shiftId) {
  const beach = document.getElementById('ss-beach')?.value;
  if (!beach) { toast('Please select a beach location.','err'); return; }
  const shiftSel = document.getElementById('ss-shift-sel')?.value;
  const shiftVal = shiftSel === 'other'
    ? (document.getElementById('ss-shift-other')?.value || 'Other')
    : (shiftSel || '');

  const getNum = id => parseInt(document.getElementById(`ss-${id}`)?.value)||0;
  const getDesc = id => document.getElementById(`ss-${id}-desc`)?.value||'';
  const training = [...document.querySelectorAll('.ss-training:checked')].map(c=>c.value);
  const flags    = [...document.querySelectorAll('.ss-flag:checked')].map(c=>c.value);

  const btn = document.querySelector('[onclick*="submitStatsForm"]');
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }

  runG('clientSubmitShiftStats', r => {
    if (r&&r.success) {
      toast('Stats submitted! 🏖️','ok');
      closeModal();
      // Remove from pending alerts
      PENDING_STATS = PENDING_STATS.filter(x => x.id !== timeRecordId);
      delete SNOOZED_STATS[timeRecordId];
      refreshStatsAlerts();
    } else {
      if (btn) { btn.disabled=false; btn.textContent='Submit Stats'; }
      toast(r?.message||'Failed to submit.','err');
    }
  }, null, {
    time_record_id:      timeRecordId,
    shift_id:            shiftVal||shiftId,
    date,
    beach_location:      beach,
    preventive_actions:  getNum('preventive'),
    bather_assists:      getNum('bather'),
    rfd_rescues:         getNum('rfd'),
    rfd_line_rescues:    getNum('rfdline'),
    seabob_rescues:      getNum('seabob'),
    first_aid:           getNum('firstaid'),
    incidents:           getNum('incidents'),       incidents_desc:    getDesc('incidents'),
    ten_55:              parseInt(document.getElementById('ss-ten55')?.value)||0, ten_55_desc: '',
    ten_24:              getNum('ten24'),            ten_24_desc:       getDesc('ten24'),
    ten_34:              getNum('ten34'),            ten_34_desc:       getDesc('ten34'),
    patron_harassment:   getNum('harassment'),       patron_harassment_desc: getDesc('harassment'),
    vandalism:           getNum('vandalism'),        vandalism_desc:    getDesc('vandalism'),
    training,
    surf_condition:      document.getElementById('ss-surf')?.value||'',
    wind_direction:      document.getElementById('ss-wind')?.value||'',
    air_temp:            document.getElementById('ss-temp')?.value||'',
    weather:             document.getElementById('ss-weather')?.value||'',
    flags_flown:         flags,
    notes:               document.getElementById('ss-notes')?.value||''
  });
}

// ── Guard: My Stats page ──────────────────────────────────────
R['stats'] = function() {
  const el = document.getElementById('content');
  const pOpts = D.periods.map(p=>`<option value="${p.id}"${D.activePeriod&&p.id===D.activePeriod.id?' selected':''}>${fd(p.start_date)} – ${fd(p.schedule_thru)}</option>`).join('');

  el.innerHTML = `
    <div class="card" style="margin-bottom:12px;padding:14px">
      <div class="flex between items-c">
        <div class="card-title" style="margin:0">My Stats</div>
        <select class="sel" style="width:auto;font-size:.78rem" onchange="loadMyStats(this.value)">${pOpts}</select>
      </div>
    </div>
    ${PENDING_STATS.length ? `<div style="margin-bottom:12px">${renderStatsAlerts()}</div>` : ''}
    <div id="my-stats-list"><div class="muted" style="padding:20px">Loading…</div></div>
    <div style="margin-top:12px">
      <button class="btn btn-navy btn-sm" onclick="openStatsForm('')">+ Submit Stats for Today</button>
    </div>`;

  if (D.activePeriod) loadMyStats(D.activePeriod.id);
};

function loadMyStats(periodId) {
  const el = document.getElementById('my-stats-list'); if (!el) return;
  runG('clientGetMyShiftStats', stats => {
    if (!stats||!stats.length) {
      el.innerHTML = '<div class="empty" style="padding:20px"><div class="ei">📋</div><p>No stats submitted this period.</p></div>';
      return;
    }
    const sorted = [...stats].sort((a,b)=>a.date>b.date?-1:1);
    el.innerHTML = sorted.map(s => {
      const d = new Date(s.date+'T12:00:00');
      const total = [s.preventive_actions,s.bather_assists,s.rfd_rescues,s.rfd_line_rescues,
        s.seabob_rescues,s.first_aid].reduce((sum,v)=>sum+(parseInt(v)||0),0);
      return `<div class="card" style="margin-bottom:8px;padding:12px 14px">
        <div class="flex between items-c">
          <div>
            <div style="font-weight:700">${DAYS[d.getDay()]} ${MONTHS[d.getMonth()]} ${d.getDate()}</div>
            <div style="font-size:.78rem;color:var(--muted)">${s.beach_location||'No location'} · ${total} actions/incidents</div>
          </div>
          <button class="btn btn-outline btn-xs" onclick="openStatsForm('${s.time_record_id}')">Edit</button>
        </div>
        ${s.training?`<div style="font-size:.72rem;color:var(--muted);margin-top:4px">Training: ${s.training}</div>`:''}
      </div>`;
    }).join('');
  }, null, periodId);
}

// ── Admin: Stats panel ────────────────────────────────────────
R['stats-admin'] = function() {
  const el = document.getElementById('content');
  if (!D.activePeriod) { el.innerHTML='<div class="card"><p class="muted">No active pay period.</p></div>'; return; }

  document.getElementById('topbar-actions').innerHTML=`
    <button class="btn btn-outline btn-sm" onclick="exportStatsCSV()">📥 Export CSV</button>`;

  const pOpts = D.periods.map(p=>`<option value="${p.id}"${D.activePeriod&&p.id===D.activePeriod.id?' selected':''}>${fd(p.start_date)} – ${fd(p.schedule_thru)}</option>`).join('');

  el.innerHTML = `
    <div class="card" style="margin-bottom:12px;padding:14px">
      <div class="flex gap2 wrap items-c">
        <select class="sel" style="width:auto" onchange="loadAdminStats(this.value)">${pOpts}</select>
        <div class="flex gap2" id="stats-view-tabs">
          <button class="btn btn-sm btn-navy" id="sv-summary" onclick="setStatsView('summary')">Summary</button>
          <button class="btn btn-sm btn-outline" id="sv-beach" onclick="setStatsView('beach')">By Beach</button>
          <button class="btn btn-sm btn-outline" id="sv-guard" onclick="setStatsView('guard')">By Guard</button>
        </div>
      </div>
    </div>
    <div id="admin-stats-content"><div class="muted" style="padding:20px">Loading…</div></div>`;

  loadAdminStats(D.activePeriod.id);
};

let _allStats = [];
let _statsView = 'summary';
let _statsPeriodId = null;

function setStatsView(view) {
  _statsView = view;
  ['summary','beach','guard'].forEach(v => {
    const btn = document.getElementById(`sv-${v}`);
    if (btn) { btn.className = v===view ? 'btn btn-sm btn-navy' : 'btn btn-sm btn-outline'; }
  });
  renderAdminStats();
}

function loadAdminStats(periodId) {
  _statsPeriodId = periodId;
  arun('clientGetAllShiftStats', stats => {
    _allStats = stats || [];
    renderAdminStats();
  }, null, periodId);
}

function renderAdminStats() {
  const el = document.getElementById('admin-stats-content'); if (!el) return;
  if (!_allStats.length) {
    el.innerHTML = '<div class="empty" style="padding:30px"><div class="ei">📋</div><p>No stats submitted for this period.</p></div>';
    return;
  }

  if (_statsView === 'summary') {
    // Totals across all stats
    const totals = {
      preventive:0, bather:0, rfd:0, rfdline:0, seabob:0,
      firstaid:0, incidents:0, ten55:0, ten24:0, ten34:0, harassment:0, vandalism:0
    };
    _allStats.forEach(s => {
      totals.preventive  += parseInt(s.preventive_actions)||0;
      totals.bather      += parseInt(s.bather_assists)||0;
      totals.rfd         += parseInt(s.rfd_rescues)||0;
      totals.rfdline     += parseInt(s.rfd_line_rescues)||0;
      totals.seabob      += parseInt(s.seabob_rescues)||0;
      totals.firstaid    += parseInt(s.first_aid)||0;
      totals.incidents   += parseInt(s.incidents)||0;
      totals.ten55       += parseInt(s.ten_55)||0;
      totals.ten24       += parseInt(s.ten_24)||0;
      totals.ten34       += parseInt(s.ten_34)||0;
      totals.harassment  += parseInt(s.patron_harassment)||0;
      totals.vandalism   += parseInt(s.vandalism)||0;
    });
    const statCard = (label, val, color='var(--navy)') =>
      `<div style="background:var(--foam);border-radius:8px;padding:10px;text-align:center">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:800;color:${color}">${val}</div>
        <div style="font-size:.68rem;color:var(--muted);text-transform:uppercase">${label}</div>
      </div>`;
    el.innerHTML = `
      <div class="card" style="margin-bottom:12px;padding:14px">
        <div class="card-title">Period Totals (${_allStats.length} reports)</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">
          ${statCard('Preventive',totals.preventive,'#2176ae')}
          ${statCard('Bather Assists',totals.bather,'#2176ae')}
          ${statCard('RFD Rescues',totals.rfd,'var(--coral)')}
          ${statCard('RFD+Line',totals.rfdline,'var(--coral)')}
          ${statCard('Seabob',totals.seabob,'var(--coral)')}
          ${statCard('First Aid',totals.firstaid,'var(--sun)')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          ${statCard('Incidents',totals.incidents,'var(--muted)')}
          ${statCard('10-55',totals.ten55,'var(--muted)')}
          ${statCard('10-24',totals.ten24,'var(--muted)')}
          ${statCard('10-34',totals.ten34,'var(--muted)')}
          ${statCard('Harassment',totals.harassment,'var(--muted)')}
          ${statCard('Vandalism',totals.vandalism,'var(--muted)')}
        </div>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="tbl"><thead><tr>
          <th>Guard</th><th>Date</th><th>Beach</th>
          <th style="text-align:center">Prev</th><th style="text-align:center">Assists</th>
          <th style="text-align:center">Rescues</th><th style="text-align:center">FA</th>
          <th>Weather</th><th>Flags</th>
        </tr></thead><tbody>
        ${[..._allStats].sort((a,b)=>a.date>b.date?-1:1).map(s=>`<tr>
          <td style="font-weight:600;font-size:.82rem">${s.guard_name||s.guard_id}</td>
          <td style="font-size:.8rem">${fd(s.date)}</td>
          <td style="font-size:.8rem">${s.beach_location||'—'}</td>
          <td style="text-align:center">${s.preventive_actions||0}</td>
          <td style="text-align:center">${s.bather_assists||0}</td>
          <td style="text-align:center;color:${parseInt(s.rfd_rescues)+parseInt(s.rfd_line_rescues||0)+parseInt(s.seabob_rescues||0)>0?'var(--coral)':'inherit'}">${(parseInt(s.rfd_rescues)||0)+(parseInt(s.rfd_line_rescues)||0)+(parseInt(s.seabob_rescues)||0)}</td>
          <td style="text-align:center">${s.first_aid||0}</td>
          <td style="font-size:.75rem">${[s.weather,s.surf_condition].filter(Boolean).join(' · ')||'—'}</td>
          <td style="font-size:.75rem">${s.flags_flown||'—'}</td>
        </tr>`).join('')}
        </tbody></table>
      </div>`;
  }

  else if (_statsView === 'beach') {
    const byBeach = {};
    _allStats.forEach(s => {
      const b = s.beach_location || 'Unknown';
      if (!byBeach[b]) byBeach[b] = { count:0,preventive:0,bather:0,rfd:0,rfdline:0,seabob:0,firstaid:0,incidents:0 };
      byBeach[b].count++;
      byBeach[b].preventive  += parseInt(s.preventive_actions)||0;
      byBeach[b].bather      += parseInt(s.bather_assists)||0;
      byBeach[b].rfd         += parseInt(s.rfd_rescues)||0;
      byBeach[b].rfdline     += parseInt(s.rfd_line_rescues)||0;
      byBeach[b].seabob      += parseInt(s.seabob_rescues)||0;
      byBeach[b].firstaid    += parseInt(s.first_aid)||0;
      byBeach[b].incidents   += parseInt(s.incidents)||0;
    });
    el.innerHTML = `<div class="card" style="padding:0;overflow:hidden">
      <table class="tbl"><thead><tr>
        <th>Beach</th><th>Reports</th><th>Preventive</th><th>Bather</th>
        <th>RFD</th><th>RFD+Line</th><th>Seabob</th><th>First Aid</th><th>Incidents</th>
      </tr></thead><tbody>
      ${Object.entries(byBeach).sort((a,b)=>b[1].count-a[1].count).map(([beach,t])=>`<tr>
        <td style="font-weight:600">${beach}</td>
        <td>${t.count}</td><td>${t.preventive}</td><td>${t.bather}</td>
        <td>${t.rfd}</td><td>${t.rfdline}</td><td>${t.seabob}</td>
        <td>${t.firstaid}</td><td>${t.incidents}</td>
      </tr>`).join('')}
      </tbody></table></div>`;
  }

  else if (_statsView === 'guard') {
    const byGuard = {};
    _allStats.forEach(s => {
      const g = s.guard_name||s.guard_id;
      if (!byGuard[g]) byGuard[g] = { count:0,preventive:0,bather:0,rescues:0,firstaid:0,incidents:0 };
      byGuard[g].count++;
      byGuard[g].preventive  += parseInt(s.preventive_actions)||0;
      byGuard[g].bather      += parseInt(s.bather_assists)||0;
      byGuard[g].rescues     += (parseInt(s.rfd_rescues)||0)+(parseInt(s.rfd_line_rescues)||0)+(parseInt(s.seabob_rescues)||0);
      byGuard[g].firstaid    += parseInt(s.first_aid)||0;
      byGuard[g].incidents   += parseInt(s.incidents)||0;
    });
    el.innerHTML = `<div class="card" style="padding:0;overflow:hidden">
      <table class="tbl"><thead><tr>
        <th>Guard</th><th>Reports</th><th>Preventive</th><th>Bather</th>
        <th>Rescues</th><th>First Aid</th><th>Incidents</th>
      </tr></thead><tbody>
      ${Object.entries(byGuard).sort((a,b)=>b[1].rescues-a[1].rescues).map(([g,t])=>`<tr>
        <td style="font-weight:600">${g}</td>
        <td>${t.count}</td><td>${t.preventive}</td><td>${t.bather}</td>
        <td style="color:${t.rescues>0?'var(--coral)':'inherit'}">${t.rescues}</td>
        <td>${t.firstaid}</td><td>${t.incidents}</td>
      </tr>`).join('')}
      </tbody></table></div>`;
  }
}

function exportStatsCSV() {
  arun('clientExportShiftStatsCSV', r => {
    if (!r||!r.success) { toast('Export failed.','err'); return; }
    const blob = new Blob([r.csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download=`shift_stats_${r.period}.csv`; a.click();
    URL.revokeObjectURL(url);
    toast('Stats exported!','ok');
  }, null, _statsPeriodId||D.activePeriod?.id);
}

</script>
